<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大富翁 - Monopoly</title>
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="大富翁">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml">
<style>
@font-face {
  font-family: 'Noto Serif SC';
  src: url('./assets/fonts/noto-400.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Noto Serif SC';
  src: url('./assets/fonts/noto-600.ttf') format('truetype');
  font-weight: 600 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Cormorant Garamond';
  src: url('./assets/fonts/cormorant-600.ttf') format('truetype');
  font-weight: 600;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Cormorant Garamond';
  src: url('./assets/fonts/cormorant-700.ttf') format('truetype');
  font-weight: 700 900;
  font-style: normal;
  font-display: swap;
}

:root {
  --gold: #c9a84c;
  --gold-light: #e0c97f;
  --gold-dark: #8b6914;
  --bg: #1a1a2e;
  --text: #e8d5b7;
  --text-light: #f5ecd7;
  --red: #c0392b;
  --red-light: #e74c3c;
  --green: #27ae60;
  --blue: #2980b9;
  --orange: #e67e22;
  --pink: #e84393;
  --brown: #8b4513;
  --light-blue: #87ceeb;
  --dark-blue: #1a237e;
  --railroad: #555;
  --utility: #aaa;
  --p4-yellow: #f1c40f;
  --p4-green: #27ae60;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a15 70%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Noto Serif SC', 'Playfair Display', serif;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(201,168,76,0.025) 2px, rgba(201,168,76,0.025) 4px),
    repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(201,168,76,0.025) 2px, rgba(201,168,76,0.025) 4px),
    radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(201,168,76,0.03) 0%, transparent 50%);
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.6;
}

.game-wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; position: relative; z-index: 1; }

.side-panel,
.right-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 260px;
  min-width: 240px;
  max-width: 280px;
}

.right-panel #propertyPanel {
  width: 100%;
}

.log-panel {
  width: 100%;
  min-height: 260px;
}

.game-log-list {
  height: 360px;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dark) rgba(255,255,255,0.04);
  padding-right: 6px;
  scroll-behavior: smooth;
}

.game-log-list::-webkit-scrollbar { width: 8px; }
.game-log-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 4px; }
.game-log-list::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 4px; }

.game-log-empty {
  color: rgba(232,213,183,0.45);
  font-size: 0.75rem;
  line-height: 1.6;
  padding: 18px 4px;
  text-align: center;
}

.game-log-entry {
  display: grid;
  grid-template-columns: 38px 18px minmax(0, 1fr);
  gap: 6px;
  align-items: start;
  padding: 9px 2px;
  border-bottom: 1px solid rgba(201,168,76,0.13);
}

.game-log-entry:last-child { border-bottom: none; }
.game-log-time { color: rgba(232,213,183,0.42); font-size: 0.65rem; line-height: 1.5; }
.game-log-icon { font-size: 0.78rem; line-height: 1.35; text-align: center; }
.game-log-copy { min-width: 0; font-size: 0.7rem; line-height: 1.5; color: var(--text); overflow-wrap: anywhere; }
.game-log-actor { color: var(--text-light); font-weight: 700; margin-right: 4px; }
.game-log-entry.type-gain .game-log-copy { color: #82e0aa; }
.game-log-entry.type-loss .game-log-copy { color: #ff9b90; }
.game-log-entry.type-property .game-log-copy,
.game-log-entry.type-building .game-log-copy,
.game-log-entry.type-auction .game-log-copy { color: var(--gold-light); }
.game-log-entry.type-jail .game-log-copy { color: #f5b56b; }
.game-log-entry.type-card .game-log-copy { color: #8fd3ff; }
.game-log-entry.type-system .game-log-copy { color: rgba(232,213,183,0.72); }

.game-log-new {
  display: none;
  width: 100%;
  margin-top: 10px;
  padding: 7px 10px;
  border: 1px solid var(--gold-dark);
  border-radius: 6px;
  background: rgba(201,168,76,0.12);
  color: var(--gold-light);
  font: inherit;
  font-size: 0.72rem;
  cursor: pointer;
}

.game-log-new.visible { display: block; animation: fadeIn 0.2s ease-out; }

.panel-card {
  background: linear-gradient(135deg, #1e2a3a 0%, #162030 100%);
  border: 2px solid var(--gold-dark);
  border-radius: 12px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
}

.panel-card::before, .panel-card::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
}
.panel-card::before { top: 0; }
.panel-card::after { bottom: 0; }

.panel-title {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  font-size: 1.3rem;
  font-weight: 700;
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.player-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,168,76,0.15);
  transition: all 0.3s;
  margin-bottom: 6px;
}

.player-item.active {
  border-color: var(--gold);
  background: rgba(201,168,76,0.08);
  box-shadow: 0 0 20px rgba(201,168,76,0.15);
}

.player-token {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 1rem;
  color: white;
  flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
  position: relative;
}

.player-token::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
}

.player-details { flex: 1; min-width: 0; }
.player-name { color: var(--text-light); font-weight: 600; font-size: 0.9rem; }
.player-money {
  color: var(--gold-light);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 700;
}
.player-props { color: rgba(232,213,183,0.5); font-size: 0.7rem; margin-top: 2px; }

/* ===== BOARD ===== */
.board-outer {
  background: linear-gradient(135deg, #1a2744 0%, #0d1b36 100%);
  border: 4px solid var(--gold-dark);
  border-radius: 8px;
  padding: 6px;
  box-shadow: 0 0 40px rgba(201,168,76,0.15), 0 10px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.3);
}

.board-grid {
  display: grid;
  grid-template-columns: repeat(11, 1fr);
  grid-template-rows: repeat(11, 1fr);
  width: 660px; height: 660px;
  gap: 2px;
  position: relative;
}

.center-area {
  grid-column: 2 / 11; grid-row: 2 / 11;
  background: linear-gradient(135deg, #0d1b36 0%, #091428 100%);
  border: 2px solid rgba(201,168,76,0.2);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.center-area::before {
  content: '大 富 翁';
  position: absolute;
  font-family: 'Playfair Display', serif;
  font-size: 3.5rem;
  font-weight: 900;
  color: rgba(201,168,76,0.08);
  letter-spacing: 10px;
  transform: rotate(-15deg);
  white-space: nowrap;
}

.game-logo {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--gold);
  text-align: center;
  letter-spacing: 6px;
  text-shadow: 0 0 20px rgba(201,168,76,0.3);
  z-index: 1;
}

.game-logo .sub { display: block; font-size: 0.7rem; letter-spacing: 4px; font-weight: 400; color: rgba(201,168,76,0.6); }

.dice-container { display: flex; justify-content: center; gap: 14px; margin: 8px 0; }

.dice {
  width: 52px; height: 52px;
  background: linear-gradient(145deg, #faf3e0, #e8d5b7);
  border-radius: 10px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  padding: 6px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 -2px 3px rgba(0,0,0,0.1);
  align-items: center; justify-items: center;
}

.dice.rolling { animation: diceRoll 0.5s ease-out; }

@keyframes diceRoll {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(90deg) scale(1.15); }
  50% { transform: rotate(200deg) scale(1.1); }
  75% { transform: rotate(310deg) scale(1.15); }
  100% { transform: rotate(360deg) scale(1); }
}

.dot { width: 10px; height: 10px; background: #2c1810; border-radius: 50%; }

.btn-roll {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a2e;
  border: none;
  padding: 12px 36px;
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  font-weight: 700;
  border-radius: 50px;
  cursor: pointer;
  letter-spacing: 3px;
  box-shadow: 0 4px 15px rgba(201,168,76,0.3);
  transition: all 0.3s;
  z-index: 1;
}

.btn-roll:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(201,168,76,0.5); }
.btn-roll:active { transform: translateY(0); }
.btn-roll:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.game-status { color: var(--text); font-size: 0.85rem; text-align: center; z-index: 1; min-height: 1.5em; }

/* ===== CELLS ===== */
.cell {
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(201,168,76,0.1);
}

.cell:hover { z-index: 10; transform: scale(1.08); box-shadow: 0 0 15px rgba(201,168,76,0.3); }

.cell .color-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; }
.cell .cell-name {
  font-weight: 700;
  line-height: 1.2;
  font-size: 0.55rem;
  color: #f0e6d3;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  padding: 0 2px;
}
.cell .cell-price { font-size: 0.4rem; color: rgba(255,255,255,0.55); }

/* Color-coded cell names by property group */
.cell.property .cell-name { color: #f0e6d3; }
.cell.corner .cell-name { color: #e0c97f; font-size: 0.65rem; text-shadow: 0 0 6px rgba(201,168,76,0.4); }
.cell.chance .cell-name { color: #f5a098; }
.cell.chest .cell-name { color: #82e0aa; }
.cell.tax .cell-name { color: #f0c0a0; }
.cell.railroad .cell-name { color: #c0c0c0; }
.cell.utility .cell-name { color: #e0d8c8; }

.cell.corner { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; background: rgba(201,168,76,0.08) !important; border-color: rgba(201,168,76,0.3); }
.cell.property { background: rgba(255,255,255,0.03); }
.cell.chance { background: rgba(231,76,60,0.08); border-color: rgba(231,76,60,0.2); }
.cell.chest { background: rgba(46,204,113,0.08); border-color: rgba(46,204,113,0.2); }
.cell.tax { background: rgba(255,255,255,0.05); }
.cell.railroad { background: rgba(255,255,255,0.05); }
.cell.utility { background: rgba(255,255,255,0.05); }

.cell .tokens-on-cell { display: flex; gap: 1px; position: absolute; top: 2px; }
.cell .mini-token { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.5); }

.cell.owned { box-shadow: inset 0 0 8px rgba(201,168,76,0.2); }

/* Teleport mode highlight */
.cell.teleport-target {
  animation: teleportPulse 0.8s ease-in-out infinite;
  border-color: rgba(46, 204, 113, 0.5) !important;
  box-shadow: 0 0 12px rgba(46, 204, 113, 0.3), inset 0 0 8px rgba(46, 204, 113, 0.1);
}

.cell.teleport-target:hover {
  border-color: rgba(46, 204, 113, 0.9) !important;
  box-shadow: 0 0 25px rgba(46, 204, 113, 0.6), inset 0 0 15px rgba(46, 204, 113, 0.2);
  transform: scale(1.1);
  z-index: 15;
}

@keyframes teleportPulse {
  0%, 100% { box-shadow: 0 0 8px rgba(46, 204, 113, 0.2), inset 0 0 6px rgba(46, 204, 113, 0.08); }
  50% { box-shadow: 0 0 18px rgba(46, 204, 113, 0.45), inset 0 0 12px rgba(46, 204, 113, 0.15); }
}

/* House icons */
.cell .houses-row {
  display: flex;
  gap: 1px;
  position: absolute;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
}

.cell .house-icon {
  width: 6px; height: 6px;
  background: #2ecc71;
  border: 1px solid #27ae60;
  clip-path: polygon(0% 100%, 0% 40%, 50% 0%, 100% 40%, 100% 100%);
}

.cell .hotel-icon {
  width: 10px; height: 7px;
  background: #e74c3c;
  border: 1px solid #c0392b;
  border-radius: 2px;
}

/* ===== CELL HIGHLIGHT ===== */
.cell.current-pos {
  animation: cellGlow 1.2s ease-in-out infinite;
  z-index: 5;
}

@keyframes cellGlow {
  0%, 100% { box-shadow: 0 0 8px rgba(201,168,76,0.4), inset 0 0 8px rgba(201,168,76,0.15); }
  50% { box-shadow: 0 0 20px rgba(201,168,76,0.8), 0 0 35px rgba(201,168,76,0.4), inset 0 0 15px rgba(201,168,76,0.25); }
}

/* ===== PENALTY ANIMATION ===== */
#penaltyContainer {
  position: fixed;
  top: clamp(76px, 9vh, 112px);
  right: clamp(16px, 2.5vw, 38px);
  z-index: 270;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
  pointer-events: none;
}

.penalty-overlay {
  width: min(310px, calc(100vw - 32px));
  pointer-events: none;
}

.penalty-burst {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  min-height: 68px;
  padding: 12px 18px 12px 16px;
  gap: 14px;
  background: linear-gradient(135deg, rgba(45,20,25,0.98), rgba(27,23,33,0.98));
  border: 1px solid rgba(255,97,88,0.65);
  border-left: 4px solid #ff4f45;
  border-radius: 6px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.52), 0 0 20px rgba(231,76,60,0.16);
  animation: penaltySlideIn 0.38s cubic-bezier(0.2, 0.85, 0.25, 1);
}

.penalty-amount {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.35rem;
  line-height: 1;
  font-weight: 900;
  color: #ff6259;
  text-shadow: 0 0 18px rgba(231,76,60,0.42), 0 3px 8px rgba(0,0,0,0.45);
  white-space: nowrap;
}

.penalty-label {
  font-size: 0.9rem;
  color: var(--text-light);
  letter-spacing: 1px;
  white-space: nowrap;
}

.penalty-overlay.fade-out {
  animation: penaltySlideOut 0.28s ease-in forwards;
}

@keyframes penaltySlideIn {
  from { transform: translateX(calc(100% + 48px)); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes penaltySlideOut {
  from { transform: translateX(0); opacity: 1; }
  to { transform: translateX(calc(100% + 48px)); opacity: 0; }
}

/* ===== DICE RESULT OVERLAY ===== */
.dice-result-overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 250;
  pointer-events: none;
  animation: diceResultIn 0.3s ease-out;
}

.dice-result-content {
  display: flex;
  align-items: center;
  gap: 20px;
  background: linear-gradient(135deg, #1e2a3a 0%, #162030 100%);
  border: 3px solid var(--gold);
  border-radius: 20px;
  padding: 24px 40px;
  box-shadow: 0 15px 50px rgba(0,0,0,0.6), 0 0 60px rgba(201,168,76,0.25);
}

.dice-result-dice { display: flex; gap: 12px; }

.dice-result-die {
  width: 64px; height: 64px;
  background: linear-gradient(145deg, #faf3e0, #e8d5b7);
  border-radius: 14px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  padding: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 -3px 4px rgba(0,0,0,0.1);
  align-items: center; justify-items: center;
  animation: dicePopIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.dice-result-die:nth-child(2) { animation-delay: 0.15s; }
.dice-result-die .rdot { width: 13px; height: 13px; background: #2c1810; border-radius: 50%; }

@keyframes dicePopIn {
  0% { transform: scale(0) rotate(-180deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.dice-result-info { display: flex; flex-direction: column; align-items: center; gap: 4px; }

.dice-result-total {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 15px rgba(201,168,76,0.4);
}

.dice-result-label { font-size: 0.8rem; color: var(--text); letter-spacing: 2px; }
.dice-result-double { font-family: 'Playfair Display', serif; font-size: 0.9rem; color: var(--gold-light); letter-spacing: 3px; animation: doublePulse 0.8s ease-in-out infinite; }

@keyframes doublePulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
}

@keyframes diceResultIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
.dice-result-overlay.fade-out { animation: diceResultOut 0.3s ease-out forwards; }
@keyframes diceResultOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.9); } }

/* ===== MOVING TOKEN ===== */
.moving-token {
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  z-index: 20;
  pointer-events: none;
  box-shadow: 0 0 15px currentColor, 0 2px 8px rgba(0,0,0,0.5);
  transition: left 0.18s ease-out, top 0.18s ease-out;
  border: 2px solid rgba(255,255,255,0.5);
}

.path-trace {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 50%;
  z-index: 8;
  pointer-events: none;
  animation: traceFade 0.6s ease-out forwards;
}

@keyframes traceFade {
  0% { opacity: 0.8; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.3); }
}

/* ===== SETUP MODAL ===== */
.setup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
  animation: fadeIn 0.5s;
}

.setup-card {
  background: linear-gradient(135deg, #1e2a3a 0%, #162030 100%);
  border: 3px solid var(--gold);
  border-radius: 20px;
  padding: 40px 50px;
  box-shadow: 0 0 80px rgba(201,168,76,0.2), 0 20px 60px rgba(0,0,0,0.5);
  animation: slideUp 0.5s ease-out;
  text-align: center;
  max-width: 480px;
  width: 90%;
}

.setup-title {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.setup-subtitle {
  font-size: 0.8rem;
  color: var(--text);
  margin-bottom: 24px;
  letter-spacing: 2px;
}

.setup-players {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
}

.setup-player-btn {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 2px solid rgba(201,168,76,0.3);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  font-size: 1.3rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.setup-player-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.1); }
.setup-player-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.2); box-shadow: 0 0 20px rgba(201,168,76,0.3); color: var(--gold-light); }

.setup-description {
  font-size: 0.75rem;
  color: rgba(232,213,183,0.6);
  line-height: 1.8;
  margin-bottom: 24px;
}

.setup-description strong { color: var(--gold-light); }

.setup-check {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 0.78rem;
  color: var(--text);
  margin-bottom: 16px;
  cursor: pointer;
}
.setup-check input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--gold);
  cursor: pointer;
}

.btn-start {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a2e;
  border: none;
  padding: 14px 48px;
  font-family: 'Noto Serif SC', serif;
  font-size: 1.1rem;
  font-weight: 700;
  border-radius: 50px;
  cursor: pointer;
  letter-spacing: 4px;
  box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  transition: all 0.3s;
}

.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.5); }
.btn-start:active { transform: translateY(0); }

/* ===== HOUSE UPGRADE PANEL ===== */
.house-upgrade-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(201,168,76,0.1);
  font-size: 0.65rem;
  color: var(--text);
}

.house-upgrade-item .prop-info { flex: 1; }
.house-upgrade-item .prop-name-u { font-weight: 600; color: var(--text-light); }
.house-upgrade-item .prop-houses { font-size: 0.6rem; color: rgba(232,213,183,0.5); }

.btn-house {
  padding: 3px 10px;
  font-size: 0.6rem;
  border-radius: 4px;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--gold-light);
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
  white-space: nowrap;
}

.btn-house:hover { background: rgba(201,168,76,0.15); }
.btn-house:disabled { opacity: 0.3; cursor: not-allowed; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s;
}

.modal-overlay.hidden { display: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-card {
  background: linear-gradient(135deg, #1e2a3a 0%, #162030 100%);
  border: 3px solid var(--gold);
  border-radius: 16px;
  padding: 30px;
  max-width: 380px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(201,168,76,0.15);
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-title {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  font-size: 1.6rem;
  text-align: center;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.modal-body { color: var(--text); text-align: center; line-height: 1.8; margin-bottom: 20px; }
.modal-body .prop-name { font-size: 1.2rem; font-weight: 700; color: var(--gold-light); }
.modal-body .prop-price { font-size: 0.9rem; color: var(--text); }

.auction-bid-field {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: 10px;
  max-width: 280px;
  margin: 14px auto 6px;
}

.auction-bid-prefix {
  color: var(--gold-light);
  font-size: 1.1rem;
  font-weight: 700;
}

.auction-bid-input {
  width: 100%;
  min-width: 0;
  padding: 10px 12px;
  border: 1px solid rgba(201,168,76,0.45);
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  color: var(--text-light);
  font: inherit;
  font-size: 1rem;
  text-align: right;
  outline: none;
}

.auction-bid-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
.auction-bid-input.invalid { border-color: var(--red-light); }
.auction-bid-help { min-height: 1.4em; font-size: 0.72rem; color: rgba(232,213,183,0.65); }
.auction-bid-error { min-height: 1.4em; font-size: 0.72rem; color: #ff8f83; }
.auction-status { margin-top: 8px; font-size: 0.75rem; color: var(--gold-light); }

.modal-buttons { display: flex; gap: 12px; justify-content: center; }

.trade-card { width: min(760px, 94vw); max-width: 760px; max-height: 90vh; overflow: hidden; padding: 24px; }
.trade-toolbar { display: grid; grid-template-columns: auto minmax(140px, 1fr) auto; gap: 10px; align-items: center; margin-bottom: 14px; color: var(--text); font-size: 0.78rem; }
.trade-toolbar select, .trade-money { min-width: 0; border: 1px solid rgba(201,168,76,0.45); border-radius: 6px; background: rgba(255,255,255,0.06); color: var(--text-light); padding: 8px 10px; font: inherit; }
.trade-toolbar option { color: #172235; }
.trade-columns { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; }
.trade-side { min-width: 0; text-align: left; }
.trade-side h3 { color: var(--gold-light); font-size: 0.9rem; margin-bottom: 8px; text-align: center; }
.trade-asset-list { height: min(30vh, 240px); overflow-y: auto; overscroll-behavior: contain; border: 1px solid rgba(201,168,76,0.18); border-radius: 6px; padding: 4px 10px; margin-bottom: 10px; }
.trade-asset-row { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 8px; align-items: center; min-height: 42px; border-bottom: 1px solid rgba(201,168,76,0.13); font-size: 0.72rem; }
.trade-asset-row:last-child { border-bottom: none; }
.trade-asset-row small { display: block; color: rgba(232,213,183,0.52); }
.trade-input-row { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 8px; align-items: center; margin: 8px 0; font-size: 0.72rem; }
.trade-check { display: flex; gap: 8px; align-items: center; font-size: 0.72rem; }
.trade-summary { min-height: 24px; margin: 12px 0 4px; color: var(--gold-light); font-size: 0.75rem; text-align: center; }
.trade-error { min-height: 22px; color: #ff8f83; font-size: 0.72rem; text-align: center; }
.trade-empty { padding: 18px 4px; text-align: center; color: rgba(232,213,183,0.45); font-size: 0.72rem; }
.btn-trade { padding: 8px 22px; font-size: 0.78rem; background: transparent; color: var(--gold-light); border: 1px solid var(--gold); }

.btn {
  padding: 10px 28px;
  border-radius: 50px;
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.3s;
  border: none;
}

.btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #1a1a2e; }
.btn-primary:hover { box-shadow: 0 4px 15px rgba(201,168,76,0.4); transform: translateY(-1px); }
.btn-secondary { background: transparent; border: 1px solid rgba(201,168,76,0.4); color: var(--text); }
.btn-secondary:hover { background: rgba(201,168,76,0.08); }

/* ===== NOTIFICATION ===== */
.notification {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #1e2a3a, #162030);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 14px 28px;
  color: var(--text-light);
  font-family: 'Noto Serif SC', serif;
  z-index: 200;
  animation: notifIn 0.3s ease-out;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  text-align: center;
  max-width: 500px;
}

.notification.fade-out { animation: notifOut 0.3s ease-out forwards; }

@keyframes notifIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
@keyframes notifOut { from { transform: translateX(-50%) translateY(0); opacity: 1; } to { transform: translateX(-50%) translateY(-20px); opacity: 0; } }

/* ===== GAME OVER ===== */
.game-over-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 300;
  animation: fadeIn 0.5s;
}

.game-over-card {
  background: linear-gradient(135deg, #1e2a3a, #162030);
  border: 3px solid var(--gold);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 0 80px rgba(201,168,76,0.2);
  animation: slideUp 0.5s ease-out;
}

.game-over-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); letter-spacing: 4px; margin-bottom: 12px; }
.game-over-winner { font-size: 1.4rem; color: var(--text-light); margin-bottom: 24px; }

@media (max-width: 1350px) {
  .game-wrapper { gap: 16px; }
  .side-panel,
  .right-panel { width: 240px; }
}

@media (max-width: 1000px) {
  .game-wrapper { flex-direction: column; align-items: center; width: 100%; padding: 12px; }
  .side-panel,
  .right-panel {
    flex-direction: row;
    min-width: auto;
    max-width: none;
    width: 100%;
    flex-wrap: wrap;
    justify-content: center;
  }
  .side-panel .panel-card { flex: 1; min-width: 200px; }
  .right-panel .panel-card { width: min(100%, 560px); }
  .game-log-list { height: min(42vh, 360px); }
  .board-grid { width: min(86vw, 660px); height: min(86vw, 660px); }
}

@media (max-width: 600px) {
  #penaltyContainer {
    top: 64px;
    right: 10px;
    gap: 8px;
  }

  .penalty-overlay {
    width: min(270px, calc(100vw - 20px));
  }

  .penalty-burst {
    min-height: 58px;
    padding: 10px 14px 10px 12px;
  }

  .penalty-amount { font-size: 2rem; }
  .penalty-label { font-size: 0.8rem; }
}

@media (max-width: 700px) {
  .trade-card { max-height: 94vh; padding: 16px; }
  .trade-toolbar { grid-template-columns: 1fr; }
  .trade-columns { grid-template-columns: 1fr; max-height: 60vh; overflow-y: auto; }
  .trade-asset-list { height: 145px; }
  .trade-card .modal-buttons { flex-wrap: wrap; }
}

/* ===== DEBT RELIEF MODAL ===== */
.debt-relief-card {
  width: min(620px, 94vw);
  max-height: 90vh;
  overflow: hidden;
}

.debt-relief-summary {
  position: sticky;
  top: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid rgba(201,168,76,0.3);
  background: #182435;
}

.debt-relief-summary div:not(.debt-relief-track) {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.debt-relief-summary strong { color: #ff8f83; }
.debt-relief-track {
  grid-column: 1 / -1;
  height: 8px;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
}
.debt-relief-track > div {
  width: 0;
  height: 100%;
  background: var(--gold);
  transition: width 0.2s ease;
}
.debt-relief-assets {
  max-height: min(52vh, 420px);
  overflow-y: auto;
  overscroll-behavior: contain;
}
.debt-relief-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  min-height: 58px;
  padding: 10px 2px;
  border-bottom: 1px solid rgba(201,168,76,0.16);
}
.debt-relief-reason {
  display: block;
  color: rgba(232,213,183,0.55);
  font-size: 0.68rem;
}

@media (max-width: 700px) {
  .debt-relief-card { padding: 16px; max-height: 94vh; }
  .debt-relief-summary { grid-template-columns: 1fr; }
  .debt-relief-track { grid-column: 1; }
  .debt-relief-row { grid-template-columns: 1fr; }
  .debt-relief-row .btn-house { width: 100%; min-height: 40px; }
}

/* ===== MODE SELECTOR ===== */
.mode-selector {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  justify-content: center;
}

.mode-btn {
  flex: 1;
  padding: 14px 20px;
  border-radius: 12px;
  border: 2px solid rgba(201,168,76,0.3);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Noto Serif SC', serif;
  font-size: 0.85rem;
  letter-spacing: 2px;
  text-align: center;
}

.mode-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
.mode-btn.selected {
  border-color: var(--gold);
  background: rgba(201,168,76,0.15);
  box-shadow: 0 0 20px rgba(201,168,76,0.2);
  color: var(--gold-light);
}

.mode-btn .mode-icon { display: block; font-size: 1.8rem; margin-bottom: 6px; }
.mode-btn .mode-label { font-weight: 700; }

/* ===== NAME INPUT ===== */
.name-input-group {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  justify-content: center;
}

.name-input-color {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
}

.name-input-field {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid rgba(201,168,76,0.3);
  background: rgba(255,255,255,0.05);
  color: var(--text-light);
  font-family: 'Noto Serif SC', serif;
  font-size: 0.85rem;
  text-align: center;
  width: 140px;
  outline: none;
  transition: border-color 0.3s;
}

.name-input-field:focus { border-color: var(--gold); }

.name-input-label {
  color: var(--text);
  font-size: 0.75rem;
  width: 50px;
  text-align: right;
  flex-shrink: 0;
}

/* ===== PASS DEVICE OVERLAY ===== */
.pass-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 400;
  animation: fadeIn 0.3s;
  cursor: pointer;
}

.pass-card {
  background: linear-gradient(135deg, #1e2a3a 0%, #162030 100%);
  border: 3px solid var(--gold);
  border-radius: 20px;
  padding: 40px 50px;
  text-align: center;
  box-shadow: 0 0 60px rgba(201,168,76,0.2), 0 20px 60px rgba(0,0,0,0.5);
  animation: slideUp 0.4s ease-out;
  cursor: pointer;
  transition: transform 0.3s;
}

.pass-card:hover { transform: scale(1.02); }

.pass-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  animation: passPulse 1.5s ease-in-out infinite;
}

@keyframes passPulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.1); opacity: 1; }
}

.pass-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 8px;
}

.pass-player-name {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 4px;
}

.pass-player-color {
  display: inline-block;
  width: 16px; height: 16px;
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
}

.pass-hint {
  font-size: 0.8rem;
  color: rgba(232,213,183,0.5);
  margin-top: 16px;
  letter-spacing: 2px;
  animation: hintBlink 2s ease-in-out infinite;
}

@keyframes hintBlink {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ===== TURN INDICATOR ===== */
.turn-indicator {
  display: none;
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  background: linear-gradient(135deg, #1e2a3a, #162030);
  border: 2px solid var(--gold);
  border-radius: 50px;
  padding: 8px 24px;
  font-family: 'Noto Serif SC', serif;
  font-size: 0.9rem;
  color: var(--gold-light);
  letter-spacing: 2px;
  animation: slideDown 0.3s ease-out;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

@keyframes slideDown {
  from { transform: translateX(-50%) translateY(-40px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* ===== MOBILE PWA SHELL ===== */
html {
  min-height: 100%;
  background: #0a0a15;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  padding: env(safe-area-inset-top) env(safe-area-inset-right)
    env(safe-area-inset-bottom) env(safe-area-inset-left);
  overscroll-behavior-y: contain;
}

.mobile-install-status {
  position: fixed;
  left: max(10px, env(safe-area-inset-left));
  right: max(10px, env(safe-area-inset-right));
  bottom: max(10px, env(safe-area-inset-bottom));
  z-index: 180;
  display: none;
  align-items: center;
  justify-content: space-between;
  min-height: 44px;
  padding: 8px 12px;
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 8px;
  background: rgba(10,10,21,0.88);
  color: var(--gold-light);
  backdrop-filter: blur(12px);
}

.mobile-install-status button {
  min-height: 34px;
  padding: 6px 12px;
  border: 1px solid var(--gold);
  border-radius: 999px;
  background: var(--gold);
  color: #111827;
  font: inherit;
  font-size: 0.72rem;
  font-weight: 700;
}

.mobile-action-dock {
  display: none;
}

  }

  .center-area::before {

  .game-logo {

  .btn-roll {

  .cell {

let nextGameLogId = 1;
let logAutoFollow = true;
let logProgrammaticScroll = false;
const MAX_GAME_LOGS = 200;

const PLAYER_COLORS = ['#e74c3c', '#2980b9', '#27ae60', '#f1c40f'];
const PLAYER_TOKEN_LABELS = ['你', 'CPU', 'CPU', 'CPU'];

function isPlayerActive(player) {
  return Boolean(player) && !player.bankrupt;
}

function createTradeBundle() {
  return { propertyIds: [], cash: 0, jailCard: false };
}

function normalizeTradeBundle(bundle) {
  bundle = bundle || {};
  const propertyIds = Array.isArray(bundle.propertyIds) ? bundle.propertyIds : [];
  return {
    propertyIds: [...new Set(propertyIds.map(Number))],
    cash: Math.max(0, Math.floor(Number(bundle.cash) || 0)),
    jailCard: Boolean(bundle.jailCard),
  };
}

function openTradeWindowForPlayer(player) {
  tradeWindow = { playerId: player.id, available: true, locked: false };
}

function consumeTradeWindow() {
  tradeWindow.available = false;
  tradeWindow.locked = false;
}

function canCurrentPlayerRoll() {
  const player = players[currentPlayerIndex];
  return !gameOver && isPlayerActive(player) && player.isHuman
    && !tradeWindow.locked && !tradeState && !debtReliefState;
}

function formatLogTime(date) {
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');
  return `${hours}:${minutes}`;
}

function createGameLogEntry({ id, timestamp, type, actor, message }) {
  return {
    id,
    timestamp: typeof timestamp === 'string' ? timestamp : formatLogTime(timestamp),
    type,
    actor: actor || '',
    message,
  };
}

function appendCappedGameLog(entries, entry, limit = MAX_GAME_LOGS) {
  return [...entries, entry].slice(-limit);
}

const LOG_TYPE_META = {
  gain: { icon: '▲', label: '收益' },
  loss: { icon: '▼', label: '支出' },
  property: { icon: '■', label: '地产' },
  auction: { icon: '◆', label: '拍卖' },
  card: { icon: '✦', label: '卡牌' },
  jail: { icon: '▣', label: '监狱' },
  building: { icon: '⌂', label: '建筑' },
  system: { icon: '•', label: '系统' },
};

function isGameLogNearBottom(container) {
  return container.scrollHeight - container.scrollTop - container.clientHeight <= 32;
}

function scrollGameLogToBottom(behavior = 'smooth') {
  const list = document.getElementById('gameLogList');
  if (!list) return;
  logAutoFollow = true;
  logProgrammaticScroll = true;
  const previousBehavior = list.style.scrollBehavior;
  list.style.scrollBehavior = behavior === 'smooth' ? 'smooth' : 'auto';
  list.scrollTop = list.scrollHeight;
  requestAnimationFrame(() => {
    list.style.scrollBehavior = previousBehavior;
    logProgrammaticScroll = false;
  });
  document.getElementById('btnNewGameLogs')?.classList.remove('visible');
}

function renderGameLogs({ forceBottom = false } = {}) {
  const list = document.getElementById('gameLogList');
  const newButton = document.getElementById('btnNewGameLogs');
  if (!list || !newButton) return;

  const shouldFollow = forceBottom || logAutoFollow || isGameLogNearBottom(list);
  const previousScrollTop = list.scrollTop;
  if (gameLogs.length === 0) {
    list.innerHTML = '<div class="game-log-empty">重大经历会按时间记录在这里</div>';
  } else {
    list.innerHTML = gameLogs.map(entry => {
      const meta = LOG_TYPE_META[entry.type] || LOG_TYPE_META.system;
      return `<article class="game-log-entry type-${entry.type}" data-log-id="${entry.id}" title="${meta.label}">
        <time class="game-log-time">${escapeHTML(entry.timestamp)}</time>
        <span class="game-log-icon" aria-hidden="true">${meta.icon}</span>
        <div class="game-log-copy">
          ${entry.actor ? `<span class="game-log-actor">${escapeHTML(entry.actor)}</span>` : ''}
          ${escapeHTML(entry.message)}
        </div>
      </article>`;
    }).join('');
  }

  if (shouldFollow) {
    requestAnimationFrame(() => scrollGameLogToBottom(forceBottom ? 'auto' : 'smooth'));
  } else {
    list.scrollTop = previousScrollTop;
    newButton.classList.add('visible');
  }
}

function addGameLog(type, actor, message, timestamp = new Date()) {
  const entry = createGameLogEntry({
    id: nextGameLogId++,
    timestamp,
    type: LOG_TYPE_META[type] ? type : 'system',
    actor,
    message,
  });
  gameLogs = appendCappedGameLog(gameLogs, entry, MAX_GAME_LOGS);
  renderGameLogs();
  return entry;
}

function initGameLogInteractions() {
  const list = document.getElementById('gameLogList');
  const newButton = document.getElementById('btnNewGameLogs');
  if (!list || !newButton || list.dataset.ready === 'true') return;
  list.dataset.ready = 'true';
  list.addEventListener('scroll', () => {
    if (logProgrammaticScroll) return;
    logAutoFollow = isGameLogNearBottom(list);
    if (logAutoFollow) newButton.classList.remove('visible');
  }, { passive: true });
  newButton.addEventListener('click', () => scrollGameLogToBottom('auto'));
}

function escapeHTML(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[ch]));
}

function sanitizePlayerName(value, fallback) {
  const cleaned = String(value || '')
    .replace(/[\u0000-\u001F\u007F]/g, '')
    .replace(/[<>&"']/g, '')
    .trim()
    .slice(0, 6);
  return cleaned || fallback;
}

function checkAllBankruptcies(creditor = null, resume = null) {
  for (const player of [...players]) {
    if (gameOver) return true;
    if (player.money < 0 && checkBankruptcy(player, creditor, resume)) return true;
  }
  return false;
}

  houseOwnership = {};
  mortgageStatus = {};
  teleportMode = false; teleportData = null;
  gameLogs = [];
  nextGameLogId = 1;
  logAutoFollow = true;
  tradeState = null;
  tradeWindow = { playerId: null, available: false, locked: false };

      name = i === 0 ? '你' : `电脑${i}`;

    players.push({
      id: i,
      name: name,
      isHuman: isHumanMode ? true : (i === 0),

      properties: [],

      jailTurns: 0,
      hasGetOutOfJailCard: false,
      consecutiveDoubles: 0,
      bankrupt: false,
      auctionProfile: {
        bids: 0,
        passes: 0,
        bidRatioEMA: 0.5,
      },
      color: PLAYER_COLORS[i],
    });

  currentPlayerIndex = 0;
  gameOver = false;
  freeParkingMoney = 0;
  document.getElementById('gameOverOverlay').style.display = 'none';
  document.getElementById('passOverlay').style.display = 'none';
  document.getElementById('turnIndicator').style.display = 'none';

  renderGameLogs({ forceBottom: true });

}

// ==================== BOARD RENDERING ====================
function renderBoard() {
  const grid = document.getElementById('boardGrid');
  grid.innerHTML = '';

  const cellMap = {};
  for (let c = 0; c <= 10; c++) { cellMap[`10,${10-c}`] = c; }
  for (let r = 0; r <= 9; r++) { cellMap[`${9-r},0`] = 10 + r + 1; }
  for (let c = 1; c <= 10; c++) { cellMap[`0,${c}`] = 20 + c; }
  for (let r = 1; r <= 9; r++) { cellMap[`${r},10`] = 30 + r; }

  for (let row = 0; row < 11; row++) {
    for (let col = 0; col < 11; col++) {
      const cell = document.createElement('div');

      if (row >= 1 && row <= 9 && col >= 1 && col <= 9) {
        if (row === 1 && col === 1) {
          cell.classList.add('center-area');
          cell.style.gridColumn = '2 / 11';
          cell.style.gridRow = '2 / 11';
          cell.innerHTML = `
            <div class="game-logo">
              大富翁
              <span class="sub">MONOPOLY</span>
            </div>
            <div class="center-dice-area">
              <div class="dice-container">
                <div class="dice" id="dice1"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
                <div class="dice" id="dice2"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
              </div>
              <button class="btn-roll" id="btnRoll" onclick="rollDice()">🎲 掷骰子</button>
              <button class="btn-roll btn-trade" id="btnTrade" type="button" onclick="openTradeComposer()">交易</button>
              <button class="btn-roll" id="btnBail" onclick="payBail()" style="display:none;background:linear-gradient(135deg,#e74c3c,#c0392b);margin-top:8px;">💰 付$500保释</button>
              <div class="game-status" id="gameStatus">点击掷骰子开始游戏！</div>
            </div>
          `;
          grid.appendChild(cell);
          continue;
        } else if (row >= 2 || col >= 2) { continue; }
      }

      const key = `${row},${col}`;
      const pos = cellMap[key];
      if (pos === undefined) continue;

      const space = SPACES[pos];
      cell.classList.add('cell');
      cell.dataset.position = pos;

      const owner = getOwner(pos);
      if (owner !== null) { cell.classList.add('owned'); }

      let bgStyle = '';
      if (space.type === 'property' && space.group && GROUP_COLORS[space.group]) {
        bgStyle = `background:${GROUP_COLORS[space.group]};`;
      }

      switch (space.type) {
        case 'property': cell.classList.add('property'); break;
        case 'chance': cell.classList.add('chance'); break;
        case 'destiny': cell.classList.add('destiny'); break;
        case 'tax': cell.classList.add('tax'); break;
        case 'railroad': cell.classList.add('railroad'); break;
        case 'utility': cell.classList.add('utility'); break;
        default: cell.classList.add('corner'); break;
      }

      let tokensHTML = '';
      players.forEach(p => {
        if (p.position === pos) {
          tokensHTML += `<div class="mini-token" style="background:${p.color};"></div>`;
        }
      });

      let priceHTML = '';
      if (space.price) {
        priceHTML = `<div class="cell-price">$${space.price}</div>`;
      } else if (space.taxAmount) {
        priceHTML = `<div class="cell-price">付$${space.taxAmount}</div>`;
      }

      // House icons
      let housesHTML = '';
      const houses = houseOwnership[pos] || 0;
      if (houses > 0 && houses < 5) {
        housesHTML = `<div class="houses-row">${'<div class="house-icon"></div>'.repeat(houses)}</div>`;
      } else if (houses === 4) {
        housesHTML = `<div class="houses-row"><div class="hotel-icon"></div></div>`;
      }

      let ownerHTML = '';
      if (owner !== null) {
        ownerHTML = `<div class="property-card-dot" style="background:${owner.color};position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;"></div>`;
      }

      cell.innerHTML = `
        ${tokensHTML ? `<div class="tokens-on-cell">${tokensHTML}</div>` : ''}
        ${ownerHTML}
        ${housesHTML}
        <div class="cell-name">${space.icon ? space.icon + ' ' : ''}${space.name}</div>
        ${priceHTML}
        <div class="color-bar" style="${bgStyle}"></div>
      `;

      cell.title = getCellTooltip(pos);

      players.forEach(p => {
        if (p.position === pos) {
          cell.classList.add(p.id === currentPlayerIndex ? 'current-pos' : 'current-pos-ai');
        }
      });

      // 传送模式：所有格子可点击
      if (teleportMode) {
        cell.classList.add('teleport-target');
        cell.style.cursor = 'pointer';
        cell.onclick = () => handleTeleportClick(pos);
      }

      grid.appendChild(cell);
    }
  }

  const btn = document.getElementById('btnRoll');
  if (btn) btn.onclick = rollDice;
}

function getCellTooltip(pos) {
  const space = SPACES[pos];
  const owner = getOwner(pos);
  const houses = houseOwnership[pos] || 0;
  let tip = space.name;
  if (space.price) tip += ` - 价格: $${space.price}`;
  if (owner) tip += ` | 拥有者: ${owner.name}`;
  if (houses > 0) tip += ` | 房屋: ${houses}级`;
  if (space.type === 'tax' && space.taxAmount) tip += ` - 缴税 $${space.taxAmount}`;
  return tip;
}

function getOwner(pos) {
  for (const p of players) { if (p.properties.includes(pos)) return p; }
  return null;
}

function resolveJailEntryDecision({ hasCard, money, choice }) {
  if (choice === 'use-card' && hasCard) {
    return { leaveJail: true, consumeCard: true, bailPaid: 0, continueTurn: false };
  }
  return { leaveJail: false, consumeCard: false, bailPaid: 0, continueTurn: false };
}

function applyJailEntryDecision(player, choice) {
  const result = resolveJailEntryDecision({
    hasCard: player.hasGetOutOfJailCard,
    money: player.money,
    choice,
  });

  if (result.consumeCard) {
    player.hasGetOutOfJailCard = false;
    notify(`${player.name} 使用出狱免费卡，立即出狱！`);
    addGameLog('jail', player.name, '使用出狱免费卡解除监狱状态');
  }
  if (result.leaveJail) {
    player.inJail = false;
    player.jailTurns = 0;
    player.consecutiveDoubles = 0;
  } else {
    notify(`${player.name} 选择留在监狱，本回合结束。`);
    addGameLog('jail', player.name, '保留出狱卡，继续留在监狱');
  }
  renderBoard();
  updateUI({ refreshBoard: false });
  endTurn(false);
}

function showJailDecisionModal(player) {
  const releaseButton = document.getElementById('btnJailRelease');
  const stayButton = document.getElementById('btnJailStay');

  document.getElementById('jailDecisionTitle').textContent = `${player.name} 进入监狱`;
  document.getElementById('jailDecisionBody').innerHTML = `
    <div>你拥有一张<strong style="color:var(--gold-light);">出狱免费卡</strong>。</div>
    <div style="margin-top:8px;font-size:0.8rem;color:rgba(232,213,183,0.65);">
      使用后立即解除监狱状态，但当前回合仍会结束。
    </div>`;

  releaseButton.textContent = '使用出狱卡';
  releaseButton.disabled = false;
  stayButton.textContent = '暂不使用';
  document.getElementById('jailDecisionModal').classList.remove('hidden');

  releaseButton.onclick = () => {
    document.getElementById('jailDecisionModal').classList.add('hidden');
    applyJailEntryDecision(player, 'use-card');
  };
  stayButton.onclick = () => {
    document.getElementById('jailDecisionModal').classList.add('hidden');
    applyJailEntryDecision(player, 'stay');
  };
}

function handleJailEntry(player, reason = `${player.name} 被送进监狱！`) {
  player.position = 10;
  player.inJail = true;
  player.jailTurns = 0;
  player.consecutiveDoubles = 0;
  notify(reason);
  addGameLog('jail', player.name, '进入监狱');
  renderBoard();
  updateUI({ refreshBoard: false });

  if (player.isHuman) {
    document.getElementById('btnRoll').disabled = true;
    if (player.hasGetOutOfJailCard) showJailDecisionModal(player);
    else {
      notify(`${player.name} 没有出狱免费卡，本回合结束。`);
      addGameLog('jail', player.name, '没有出狱卡，本回合结束');
      endTurn(false);
    }
    return;
  }

  if (player.hasGetOutOfJailCard) applyJailEntryDecision(player, 'use-card');
  else {
    notify(`${player.name} 没有出狱免费卡，本回合结束。`);
    addGameLog('jail', player.name, '没有出狱卡，本回合结束');
    endTurn(false);
  }
}

// ==================== DICE ====================
function payBail() {
  const player = players[currentPlayerIndex];
  if (!player.inJail || !player.isHuman) return;
  if (player.money < 500) { notify('资金不足，无法支付保释金。'); return; }
  player.money -= 500;
  freeParkingMoney += 500;
  player.inJail = false;
  player.jailTurns = 0;
  player.consecutiveDoubles = 0;
  notify(`${player.name} 支付 $500 保释金出狱！`);
  addGameLog('loss', player.name, '支付 $500 保释金出狱');
  document.getElementById('btnBail').style.display = 'none';
  document.getElementById('btnRoll').disabled = false;
  setStatus('点击掷骰子！');
  renderBoard(); updateUI({ refreshBoard: false });
}

function rollDice() {
  if (!canCurrentPlayerRoll()) return;
  consumeTradeWindow();

  const btn = document.getElementById('btnRoll');
  btn.disabled = true;

  const d1 = Math.floor(Math.random() * 6) + 1;
  const d2 = Math.floor(Math.random() * 6) + 1;

  const dice1El = document.getElementById('dice1');
  const dice2El = document.getElementById('dice2');
  if (!dice1El || !dice2El) return;

  dice1El.classList.add('rolling');
  dice2El.classList.add('rolling');

  setTimeout(() => {
    renderDice(dice1El, d1);
    renderDice(dice2El, d2);
    dice1El.classList.remove('rolling');
    dice2El.classList.remove('rolling');

    const isDouble = d1 === d2;
    lastDiceRoll = [d1, d2];
    showDiceResult(d1, d2, isDouble, () => {
      processTurn(d1 + d2, isDouble, d1, d2);
    });
  }, 500);
}

function renderDice(el, value) {
  const dotMap = {
    1: [[1,1]], 2: [[0,2],[2,0]], 3: [[0,2],[1,1],[2,0]],
    4: [[0,0],[0,2],[2,0],[2,2]], 5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
    6: [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
  };
  const dots = dotMap[value];
  const spans = el.querySelectorAll('span');
  spans.forEach(s => s.className = '');
  dots.forEach(([r, c]) => { const idx = r * 3 + c; if (spans[idx]) spans[idx].className = 'dot'; });
}

// ==================== TURN LOGIC ====================
function processTurn(steps, isDouble, d1, d2) {
  const player = players[currentPlayerIndex];
  let pos = player.position;
  let passedGo = false;

  // Track consecutive doubles
  if (isDouble) {
    player.consecutiveDoubles++;
    if (player.consecutiveDoubles >= 3) {
      handleJailEntry(player, `${player.name} 连续3次掷出双数，直接进监狱！`);
      return;
    }
  } else {
    player.consecutiveDoubles = 0;
  }

  if (player.inJail) {
    if (isDouble) {
      player.inJail = false;
      player.jailTurns = 0;
      player.consecutiveDoubles = 0;
      notify('掷出双数，出狱！');
    } else {
      player.jailTurns++;
      if (player.jailTurns >= 3) {
        player.money -= 500; freeParkingMoney += 500; player.inJail = false; player.jailTurns = 0; notify(`${player.name} 付 $500 保释金出狱。`);
      } else {
        notify(`${player.name} 还在监狱中...（第${player.jailTurns}回合）`);
        endTurn(isDouble); return;
      }
    }
  }

  const path = [];
  for (let i = 0; i < steps; i++) {
    pos = (pos + 1) % BOARD_SIZE;
    path.push(pos);
    if (pos === 0) { player.money += 1000; passedGo = true; }
  }
  const finalPos = pos;

  animateMove(player, path, finalPos, passedGo, () => {
    renderBoard(); updateUI({ refreshBoard: false });
    if (player.isHuman) { handleLandingHuman(player, finalPos, isDouble, d1, d2); }
    else { handleLandingAI(player, finalPos, isDouble, d1, d2); }
  });
}

function getNextActivePlayerIndex(fromIndex) {
  for (let offset = 1; offset <= players.length; offset++) {
    const index = (fromIndex + offset) % players.length;
    if (isPlayerActive(players[index])) return index;
  }
  return fromIndex;
}

function beginPlayerTurn(player) {
  openTradeWindowForPlayer(player);
  updateUI();
  if (player.isHuman) {
    document.getElementById('btnRoll').disabled = false;
    setStatus('可先交易，或点击掷骰子开始回合。');
    return;
  }
  // AI trade evaluation: skip if no valid targets (e.g. setting off + no AI opponent)
  if (!allowAIInitiatedHumanTrades && !getActivePlayers().some(p => p.id !== player.id && !p.isHuman)) {
    consumeTradeWindow();
    setStatus(`${player.name} 思考中...`);
    setTimeout(() => aiRollDice(), 500);
    return;
  }
  setStatus(`${player.name} 正在评估交易...`);
  attemptAITradeAtTurnStart(player, () => {
    consumeTradeWindow();
    if (!gameOver && isPlayerActive(player)) {
      setStatus(`${player.name} 思考中...`);
      setTimeout(() => aiRollDice(), 500);
    }
  });
}

function endTurn(wasDouble) {
  if (gameOver) return;

  if (wasDouble) {
    const player = players[currentPlayerIndex];
    if (player.isHuman) {
      document.getElementById('btnRoll').disabled = false;
      setStatus('掷出了双数！再掷一次！');
    } else { setTimeout(() => aiRollDice(), 800); }
    return;
  }

  recordCompletedTurn(players[currentPlayerIndex].id);
  currentPlayerIndex = getNextActivePlayerIndex(currentPlayerIndex);
  beginPlayerTurn(players[currentPlayerIndex]);
}

// ==================== HUMAN LANDING ====================
function handleLandingHuman(player, pos, isDouble, d1, d2) {
  const space = SPACES[pos];

  switch (space.type) {
    case 'property':
      const owner = getOwner(pos);
      if (owner === null) {
        if (player.money >= space.price) { showBuyModal(pos, space, isDouble); }
        else { notify('资金不足，无法购买，进入拍卖！'); startAuction(pos, isDouble); }
      } else if (owner.id !== player.id) {
        const rent = calculateRent(pos, owner, d1, d2);
        player.money -= rent; owner.money += rent;
        showPenaltyAnimation(rent);
        notify(`${player.name} 支付 $${rent} 租金给 ${owner.name}！`);
        addGameLog('loss', player.name, `向 ${owner.name} 支付 $${rent} 租金`);
        addGameLog('gain', owner.name, `收到 ${player.name} 的 $${rent} 租金`);
        const resumeAfterRent = () => endTurn(isDouble);
        if (!checkBankruptcy(player, owner, resumeAfterRent)) resumeAfterRent();
      } else { notify('这是你的地产。'); endTurn(isDouble); }
      break;

    case 'chance': handleCard('chance', player, isDouble, d1, d2); break;
    case 'destiny': handleCard('destiny', player, isDouble, d1, d2); break;

    case 'tax':
      // 所得税: 现金的10%, 最低200, 最高2000（规则文档第203-205行）
      if (space.name === '所得税') {
        const taxAmount = Math.max(200, Math.min(2000, Math.floor(player.money * 0.1)));
        player.money -= taxAmount;
        showPenaltyAnimation(taxAmount);
        notify(`${player.name} 缴纳所得税 $${taxAmount}（现金的10%）。`);
        addGameLog('loss', player.name, `缴纳所得税 $${taxAmount}`);
      } else {
        // 豪宅税: 拥有8个以上建筑时，每个建筑缴纳100（规则文档第209-210行）
        let totalBuildings = 0;
        for (const pos of player.properties) {
          totalBuildings += (houseOwnership[pos] || 0);
        }
        if (totalBuildings >= 8) {
          const luxuryTax = totalBuildings * 100;
          player.money -= luxuryTax;
          freeParkingMoney += luxuryTax;
          showPenaltyAnimation(luxuryTax);
          notify(`${player.name} 缴纳豪宅税 $${luxuryTax}（${totalBuildings}个建筑 × $100）。`);
          addGameLog('loss', player.name, `缴纳豪宅税 $${luxuryTax}`);
        } else {
          notify(`${player.name} 未达到豪宅税起征点（需8个以上建筑）。`);
        }
      }
      const resumeAfterTax = () => endTurn(isDouble);
      if (!checkBankruptcy(player, null, resumeAfterTax)) resumeAfterTax();
      break;

    case 'goToJail':
      handleJailEntry(player);
      break;

    case 'freeParking':
      if (freeParkingMoney > 0) {
        const prize = freeParkingMoney;
        player.money += prize;
        notify(`${player.name} 获得免费停车奖金 $${prize}！`);
        addGameLog('gain', player.name, `获得免费停车奖金 $${prize}`);
        freeParkingMoney = 0;
      }
      else { notify('免费停车，休息一下。'); }
      endTurn(isDouble); break;

    case 'go': case 'jail': endTurn(isDouble); break;
    default: endTurn(isDouble);
  }
}

// ==================== AI ====================
function aiRollDice() {
  if (gameOver) return;
  const d1 = Math.floor(Math.random() * 6) + 1;
  const d2 = Math.floor(Math.random() * 6) + 1;
  const isDouble = d1 === d2;
  lastDiceRoll = [d1, d2];

  const dice1El = document.getElementById('dice1'), dice2El = document.getElementById('dice2');
  if (dice1El && dice2El) { renderDice(dice1El, d1); renderDice(dice2El, d2); }

  showDiceResult(d1, d2, isDouble, () => {
    processTurnAI(d1 + d2, isDouble, d1, d2);
  });
}

function processTurnAI(steps, isDouble, d1, d2) {
  const player = players[currentPlayerIndex];
  if (player.isHuman) return;

  let pos = player.position;
  let passedGo = false;

  // Track consecutive doubles
  if (isDouble) {
    player.consecutiveDoubles++;
    if (player.consecutiveDoubles >= 3) {
      handleJailEntry(player, `${player.name} 连续3次掷出双数，直接进监狱！`);
      return;
    }
  } else {
    player.consecutiveDoubles = 0;
  }

  if (player.inJail) {
    if (isDouble) {
      player.inJail = false;
      player.jailTurns = 0;
      player.consecutiveDoubles = 0;
      notify(`${player.name} 掷出双数出狱！`);
    } else {
      player.jailTurns++;
      if (player.jailTurns >= 3) {
        if (player.money >= 500) { player.money -= 500; freeParkingMoney += 500; player.inJail = false; player.jailTurns = 0; notify(`${player.name} 付 $500 保释金出狱。`); }
        else { notify(`${player.name} 还在监狱中...`); endTurn(isDouble); return; }
      } else { notify(`${player.name} 还在监狱中...`); endTurn(isDouble); return; }
    }
  }

  const path = [];
  for (let i = 0; i < steps; i++) { pos = (pos + 1) % BOARD_SIZE; path.push(pos); if (pos === 0) { player.money += 1000; passedGo = true; } }
  const finalPos = pos;

  animateMove(player, path, finalPos, passedGo, () => {
    renderBoard(); updateUI({ refreshBoard: false });
    handleLandingAI(player, finalPos, isDouble, d1, d2);
  });
}

function handleLandingAI(player, pos, isDouble, d1, d2) {
  const space = SPACES[pos];

  switch (space.type) {
    case 'property':
      const owner = getOwner(pos);
      if (owner === null) {
        // AI buying strategy: buy if affordable, prioritize properties where AI already owns part of the group
        const group = space.group;
        const groupPositions = group && COLOR_GROUPS[group] ? COLOR_GROUPS[group] : [];
        const ownedInGroup = groupPositions.filter(p => player.properties.includes(p)).length;
        const groupTotal = groupPositions.length;
        const hasGroupInterest = group && ownedInGroup > 0;
        const minReserve = hasGroupInterest ? 100 : 200;
        const fullGroupBonus = (group && ownedInGroup + 1 >= groupTotal) ? 0 : 50; // More likely to buy if it completes a group

        if (player.money >= space.price && player.money - space.price > minReserve - fullGroupBonus) {
          player.money -= space.price; player.properties.push(pos);
          notify(`${player.name} 购买了 ${space.name}。`);
          addGameLog('property', player.name, `以 $${space.price} 购买 ${space.name}`);
        } else {
          notify(`${player.name} 选择不购买 ${space.name}，进入拍卖。`);
          startAuction(pos, isDouble);
          return;
        }
      } else if (owner.id !== player.id) {
        const rent = calculateRent(pos, owner, d1, d2);
        player.money -= rent; owner.money += rent;
        if (owner.isHuman) showPenaltyAnimation(rent);
        notify(`${player.name} 支付 $${rent} 租金给 ${owner.name}。`);
        addGameLog('loss', player.name, `向 ${owner.name} 支付 $${rent} 租金`);
        addGameLog('gain', owner.name, `收到 ${player.name} 的 $${rent} 租金`);
        if (checkBankruptcy(player, owner)) return;
      }
      break;

    case 'chance': handleCardAI('chance', player, isDouble, d1, d2); return;
    case 'destiny': handleCardAI('destiny', player, isDouble, d1, d2); return;
    case 'tax':
      // 所得税: 现金的10%, 最低200, 最高2000（规则文档第203-205行）
      if (space.name === '所得税') {
        const taxAmount = Math.max(200, Math.min(2000, Math.floor(player.money * 0.1)));
        player.money -= taxAmount;
        notify(`${player.name} 缴纳所得税 $${taxAmount}（现金的10%）。`);
        addGameLog('loss', player.name, `缴纳所得税 $${taxAmount}`);
      } else {
        // 豪宅税: 拥有8个以上建筑时，每个建筑缴纳100（规则文档第209-210行）
        let totalBuildings = 0;
        for (const pos of player.properties) {
          totalBuildings += (houseOwnership[pos] || 0);
        }
        if (totalBuildings >= 8) {
          const luxuryTax = totalBuildings * 100;
          player.money -= luxuryTax;
          freeParkingMoney += luxuryTax;
          notify(`${player.name} 缴纳豪宅税 $${luxuryTax}（${totalBuildings}个建筑 × $100）。`);
          addGameLog('loss', player.name, `缴纳豪宅税 $${luxuryTax}`);
        } else {
          notify(`${player.name} 未达到豪宅税起征点。`);
        }
      }
      break;
    case 'goToJail':
      handleJailEntry(player);
      return;
    case 'freeParking':
      if (freeParkingMoney > 0) {
        const prize = freeParkingMoney;
        player.money += prize;
        notify(`${player.name} 获得免费停车奖金 $${prize}！`);
        addGameLog('gain', player.name, `获得免费停车奖金 $${prize}`);
        freeParkingMoney = 0;
      }
      break;
  }

  // AI house building
  aiBuildHouses(player);

  if (!checkBankruptcy(player)) endTurn(isDouble);
}

// ==================== AI HOUSE BUILDING ====================
function aiBuildHouses(player) {
  if (player.money < 800) return;
  let built = 0;
  const maxBuildsPerTurn = 3;
  const groups = Object.entries(COLOR_GROUPS);
  for (const [group, positions] of groups) {
    if (built >= maxBuildsPerTurn) break;
    const owned = positions.filter(p => player.properties.includes(p));
    if (owned.length !== positions.length) continue;
    // Build evenly
    const minHouses = Math.min(...owned.map(p => houseOwnership[p] || 0));
    if (minHouses >= 4) continue; // 最高4级=地标（规则文档第84-89行）
    const cost = HOUSE_COST[group];
    for (const pos of owned) {
      if (built >= maxBuildsPerTurn) break;
      const h = houseOwnership[pos] || 0;
      if (h === minHouses && h < 4 && player.money >= cost + 500 && canBuildHouse(player, pos)) {
        player.money -= cost;
        houseOwnership[pos] = h + 1;
        const label = HOUSE_LEVEL_NAMES[houseOwnership[pos]]; // 规则文档第84-89行
        notify(`${player.name} 在 ${SPACES[pos].name} 建造了${label}！($${cost})`);
        addGameLog('building', player.name, `在 ${SPACES[pos].name} 建造${label}，花费 $${cost}`);
        built++;
      }
    }
  }
}

// ==================== CARDS ====================
function handleCard(type, player, isDouble, d1, d2) {
  const deck = type === 'chance' ? CHANCE_CARDS : DESTINY_CARDS;
  const card = deck[Math.floor(Math.random() * deck.length)];
  const title = type === 'chance' ? '机会卡' : '社区福利卡';

  document.getElementById('cardModalTitle').textContent = title;
  document.getElementById('cardModalBody').textContent = card.text;
  document.getElementById('cardModal').classList.remove('hidden');

  document.getElementById('btnCardOk').onclick = () => {
    document.getElementById('cardModal').classList.add('hidden');

    // "任意传送"：人类玩家进入选择模式，AI随机传送
    if (card.text.includes('任意传送')) {
      if (player.isHuman) {
        activateTeleport(player, isDouble, d1, d2);
        return;
      }
      // AI: 随机传送
      const newPos = Math.floor(Math.random() * BOARD_SIZE);
      player.position = newPos;
      notify(`${title}: 传送到 ${SPACES[newPos].name}！`);
      addGameLog('card', player.name, `${title}：传送到 ${SPACES[newPos].name}`);
      if (checkAllBankruptcies(player)) return;
      renderBoard(); updateUI({ refreshBoard: false });
      handleLandingAI(player, player.position, isDouble, d1, d2);
      return;
    }

    const oldPos = player.position;
    const msg = card.action(player);

    const continueCardResolution = () => {
      if (player.inJail && !gameOver) {
        handleJailEntry(player, `${title}: ${msg}`);
        return;
      }
      notify(`${title}: ${msg}`);
      addGameLog('card', player.name, `${title}：${msg}`);
      renderBoard();
      updateUI({ refreshBoard: false });
      if (player.position !== oldPos && !gameOver) {
        handleLandingHuman(player, player.position, isDouble, d1, d2);
      } else {
        endTurn(isDouble);
      }
    };
    if (!checkAllBankruptcies(player, continueCardResolution)) {
      continueCardResolution();
    }
  };
}

function handleCardAI(type, player, isDouble, d1, d2) {
  const deck = type === 'chance' ? CHANCE_CARDS : DESTINY_CARDS;
  const card = deck[Math.floor(Math.random() * deck.length)];
  const title = type === 'chance' ? '机会卡' : '社区福利卡';
  const oldPos = player.position;
  const msg = card.action(player);
  if (checkAllBankruptcies(player)) return;
  if (player.inJail && !gameOver) {
    handleJailEntry(player, `${title}: ${msg} (${player.name})`);
    return;
  }
  notify(`${title}: ${msg} (${player.name})`);
  addGameLog('card', player.name, `${title}：${msg}`);
  renderBoard(); updateUI({ refreshBoard: false });
  // Re-process landing if card moved the player to a new position
  if (player.position !== oldPos && !gameOver) {
    handleLandingAI(player, player.position, isDouble, d1, d2);
  } else {
    aiBuildHouses(player);
    if (!checkAllBankruptcies(player)) endTurn(isDouble);
  }
}
