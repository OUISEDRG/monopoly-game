// ==================== RENT CALCULATION ====================
// 规则文档: 空地租金=地价10%(第79行), 倍率0=1x/1=3x/2=6x/3=12x/4=20x(第94-99行)
// 垄断且无建筑: 基础租金翻倍(第107-109行)
function calculateRent(pos, owner, d1, d2) {
  const space = SPACES[pos];
  if (!space.baseRent) return 0;
  if (mortgageStatus[pos]) return 0; // 抵押地产不收租（规则文档第137-143行）

  const group = space.group;
  const groupProps = COLOR_GROUPS[group] || [];
  const ownedInGroup = owner.properties.filter(p => groupProps.includes(p)).length;
  const houses = houseOwnership[pos] || 0;
  const hasMonopoly = ownedInGroup === groupProps.length;

  // 垄断且无建筑：基础租金翻倍
  if (hasMonopoly && houses === 0) {
    return space.baseRent * 2;
  }

  // 有建筑：基础租金 × 倍率
  if (houses > 0) {
    return space.baseRent * RENT_MULTIPLIER[houses];
  }

  // 无垄断空地：基础租金（地价10%）
  return space.baseRent;
}

// ==================== HOUSE BUILDING ====================
// 规则文档: 0=空地/1=房屋/2=公寓/3=酒店/4=地标(第84-89行), 必须平均建设(第120-131行)
function canBuildHouse(player, pos) {
  const space = SPACES[pos];
  if (!space.group) return false;
  if (!player.properties.includes(pos)) return false;

  const group = space.group;
  const groupProps = COLOR_GROUPS[group] || [];
  const owned = player.properties.filter(p => groupProps.includes(p));
  if (owned.length !== groupProps.length) return false;
  if (groupProps.some(p => mortgageStatus[p])) return false;

  const currentHouses = houseOwnership[pos] || 0;
  if (currentHouses >= 4) return false; // 最高4级=地标

  // Must build evenly
  const minHouses = Math.min(...owned.map(p => houseOwnership[p] || 0));
  if (currentHouses > minHouses) return false;

  const cost = HOUSE_COST[group];
  return player.money >= cost;
}

function buildHouse(player, pos) {
  if (!canBuildHouse(player, pos)) return;
  const cost = HOUSE_COST[SPACES[pos].group];
  player.money -= cost;
  houseOwnership[pos] = (houseOwnership[pos] || 0) + 1;
  const level = houseOwnership[pos];
  const label = HOUSE_LEVEL_NAMES[level]; // 规则文档第84-89行
  notify(`${player.name} 在 ${SPACES[pos].name} 建造了${label}！($${cost})`);
  addGameLog('building', player.name, `在 ${SPACES[pos].name} 建造${label}，花费 $${cost}`);
  renderBoard(); updateUI({ refreshBoard: false });
}

function canSellHouse(player, pos) {
  if (!player.properties.includes(pos)) return false;
  const h = houseOwnership[pos] || 0;
  if (h === 0) return false;
  const space = SPACES[pos];
  if (!space.group) return false;
  // 必须平均出售：只能从等级最高的地产出售
  const groupProps = COLOR_GROUPS[space.group] || [];
  const maxHouses = Math.max(...groupProps.map(p => houseOwnership[p] || 0));
  return h >= maxHouses;
}

// ==================== MORTGAGE / UNMORTGAGE ====================
// 规则文档: 抵押=原价50%, 解押=抵押金额+10%手续费(第137-143行)
function canMortgage(player, pos) {
  if (!player.properties.includes(pos)) return false;
  if (mortgageStatus[pos]) return false; // 已抵押
  if (houseOwnership[pos]) return false; // 有建筑不能抵押
  // 同色组内其他地产有建筑也不能抵押
  const space = SPACES[pos];
  const group = space.group;
  if (group) {
    const groupProps = COLOR_GROUPS[group] || [];
    for (const p of groupProps) {
      if (houseOwnership[p]) return false;
    }
  }
  return true;
}

function mortgageProperty(player, pos) {
  if (!canMortgage(player, pos)) return;
  const price = SPACES[pos].price;
  const mortgageValue = Math.floor(price * 0.5);
  player.money += mortgageValue;
  mortgageStatus[pos] = true;
  notify(`${player.name} 抵押了 ${SPACES[pos].name}，获得 $${mortgageValue}。`);
  addGameLog('property', player.name, `抵押 ${SPACES[pos].name}，获得 $${mortgageValue}`);
  renderBoard(); updateUI({ refreshBoard: false });
}

function canUnmortgage(player, pos) {
  if (!player.properties.includes(pos)) return false;
  if (!mortgageStatus[pos]) return false;
  const price = SPACES[pos].price;
  const cost = Math.floor(price * 0.5 * 1.1); // 抵押金额 + 10%手续费
  return player.money >= cost;
}

function unmortgageProperty(player, pos) {
  if (!canUnmortgage(player, pos)) return;
  const price = SPACES[pos].price;
  const cost = Math.floor(price * 0.5 * 1.1);
  player.money -= cost;
  mortgageStatus[pos] = false;
  notify(`${player.name} 解押了 ${SPACES[pos].name}，支付 $${cost}。`);
  addGameLog('loss', player.name, `解押 ${SPACES[pos].name}，支付 $${cost}`);
  renderBoard(); updateUI({ refreshBoard: false });
}

// ==================== SELL HOUSE BACK TO BANK ====================
// 半价卖回银行（规则文档第226-232行：破产时先卖建筑）
function sellHouse(player, pos) {
  const h = houseOwnership[pos] || 0;
  if (h === 0) return;
  const cost = HOUSE_COST[SPACES[pos].group];
  const refund = Math.floor(cost * 0.5);
  player.money += refund;
  houseOwnership[pos] = h - 1;
  const label = HOUSE_LEVEL_NAMES[houseOwnership[pos]] || '空地';
  notify(`${player.name} 出售了 ${SPACES[pos].name} 的建筑，退回 $${refund}（现为${label}）。`);
  addGameLog('building', player.name, `出售 ${SPACES[pos].name} 建筑，收回 $${refund}`);
  renderBoard(); updateUI({ refreshBoard: false });
}

function getDebtReliefActions(player) {
  const sellableBuildings = [];
  const mortgageableProperties = [];

  for (const pos of player.properties) {
    if (canSellHouse(player, pos)) {
      sellableBuildings.push({
        pos,
        refund: Math.floor((HOUSE_COST[SPACES[pos].group] || 0) * 0.5),
      });
    }
    if (canMortgage(player, pos)) {
      mortgageableProperties.push({
        pos,
        value: Math.floor(SPACES[pos].price * 0.5),
      });
    }
  }

  return { sellableBuildings, mortgageableProperties };
}

function hasDebtReliefActions(actions) {
  return actions.sellableBuildings.length > 0
    || actions.mortgageableProperties.length > 0;
}

function getDebtReliefBlockReason(player, pos) {
  if (mortgageStatus[pos]) return '已抵押';
  if (houseOwnership[pos] && !canSellHouse(player, pos)) return '需遵守平均出售规则';
  const group = COLOR_GROUPS[SPACES[pos].group] || [];
  if (group.some(id => houseOwnership[id])) return '同色组仍有建筑，不能抵押';
  return '当前没有可处置项目';
}

function showDebtReliefModal() {
  const state = debtReliefState;
  const player = players.find(candidate => candidate.id === state?.playerId);
  if (!state || !player) return;
  const actions = getDebtReliefActions(player);
  const sellable = new Map(actions.sellableBuildings.map(item => [item.pos, item]));
  const mortgageable = new Map(actions.mortgageableProperties.map(item => [item.pos, item]));
  const needed = Math.max(0, -player.money);
  const repaid = Math.max(0, state.initialDebt - needed);
  const progress = Math.min(100, Math.round((repaid / state.initialDebt) * 100));

  document.getElementById('debtReliefTitle').textContent = `${player.name} · 债务处置`;
  document.getElementById('debtReliefCash').textContent = `$${player.money}`;
  document.getElementById('debtReliefNeeded').textContent = `$${needed}`;
  document.getElementById('debtReliefProgress').style.width = `${progress}%`;
  document.getElementById('debtReliefAssets').innerHTML = player.properties.map(pos => {
    const space = SPACES[pos];
    const sale = sellable.get(pos);
    const mortgage = mortgageable.get(pos);
    const action = sale
      ? `<button class="btn-house" onclick="performDebtReliefAction('sell-building',${pos})">出售建筑 +$${sale.refund}</button>`
      : mortgage
        ? `<button class="btn-house" onclick="performDebtReliefAction('mortgage',${pos})">抵押 +$${mortgage.value}</button>`
        : `<span class="debt-relief-reason">${getDebtReliefBlockReason(player, pos)}</span>`;
    return `<div class="debt-relief-row">
      <div>
        <strong>${escapeHTML(space.name)}</strong>
        <span class="debt-relief-reason">${HOUSE_LEVEL_NAMES[houseOwnership[pos] || 0]} · ${mortgageStatus[pos] ? '已抵押' : '未抵押'}</span>
      </div>
      ${action}
    </div>`;
  }).join('');
  document.getElementById('debtReliefModal').classList.remove('hidden');
}

function performDebtReliefAction(type, pos) {
  const state = debtReliefState;
  const player = players.find(candidate => candidate.id === state?.playerId);
  if (!state || !player || player.money >= 0) return;

  if (type === 'sell-building' && canSellHouse(player, pos)) {
    sellHouse(player, pos);
  } else if (type === 'mortgage' && canMortgage(player, pos)) {
    mortgageProperty(player, pos);
  } else {
    document.getElementById('debtReliefStatus').textContent = '该资产当前不可处置。';
    showDebtReliefModal();
    return;
  }
  resolveDebtReliefProgress();
}

function resolveDebtReliefProgress() {
  const state = debtReliefState;
  const player = players.find(candidate => candidate.id === state?.playerId);
  if (!state || !player) return;

  if (player.money >= 0) {
    addGameLog('system', player.name, `完成债务处置，当前现金 $${player.money}`);
    finishDebtRelief(true);
    updateUI();
    return;
  }

  const actions = getDebtReliefActions(player);
  if (!hasDebtReliefActions(actions)) {
    const creditor = players.find(candidate => candidate.id === state.creditorId) || null;
    finishDebtRelief(false);
    finalizePlayerBankruptcy(player, creditor);
    return;
  }
  showDebtReliefModal();
}

// ==================== AUCTION SYSTEM ====================
// 规则文档: 无人购买→银行立即拍卖, 起拍价100, 每次加价至少50(第216-221行)
let auctionState = null; // { pos, highestBid, highestBidder, biddingPlayerIndex, activeBidderIds }

function getMinimumAuctionBid(state) {
  return state.highestBidder ? state.highestBid + 50 : state.highestBid;
}

function validateAuctionBid(rawValue, playerMoney, minBid) {
  const text = String(rawValue).trim();
  if (!/^\d+$/.test(text)) {
    return { valid: false, value: null, message: '请输入整数出价。' };
  }

  const value = Number(text);
  if (value < minBid) {
    return { valid: false, value, message: `出价不能低于 $${minBid}。` };
  }
  if (value > playerMoney) {
    return { valid: false, value, message: `出价不能超过你的现金 $${playerMoney}。` };
  }
  return { valid: true, value, message: '' };
}

function getAuctionResolution(state) {
  if (!state.highestBidder && state.activeBidderIds.length === 0) return 'unsold';
  if (state.highestBidder) {
    const competitors = state.activeBidderIds.filter(id => id !== state.highestBidder.id);
    if (competitors.length === 0) return 'sold';
  }
  return 'continue';
}

function calculateAIAuctionReserve({ cash, highestOpponentRent, plannedBuildCost }) {
  const reserve = Math.max(1000, cash * 0.15, highestOpponentRent, plannedBuildCost);
  return Math.ceil(reserve / 50) * 50;
}

function calculateAIAuctionValuation({
  price,
  ownedInGroup,
  groupTotal,
  opponentNearMonopoly,
  unownedPropertyCount,
  canAffordDevelopment,
}) {
  let ratio = 0.5 + ownedInGroup * 0.1;
  if (groupTotal > 0 && ownedInGroup + 1 >= groupTotal) ratio += 0.35;
  else if (opponentNearMonopoly) ratio += 0.15;
  if (unownedPropertyCount <= 8) ratio += 0.05;
  if (!canAffordDevelopment) ratio -= 0.1;
  ratio = Math.max(0.35, Math.min(0.95, ratio));
  return Math.floor(price * ratio);
}

function calculateAIAuctionMaxBid({ cash, reserve, valuation }) {
  return Math.max(0, Math.floor(Math.min(valuation, cash - reserve)));
}

function chooseAdaptiveAIBid({ minBid, maxBid, propertyPrice, opponentAggression }) {
  const aggression = Math.max(0, Math.min(1, opponentAggression));
  const step = Math.max(50, Math.round(propertyPrice * (0.05 + aggression * 0.05) / 50) * 50);
  return Math.min(maxBid, minBid + step);
}

function resolveAIOnlyAuction({ currentBid, highestBidderId, candidates }) {
  const requiredBid = highestBidderId === null ? currentBid : currentBid + 50;
  const eligible = candidates
    .filter(candidate => candidate.id === highestBidderId || candidate.maxBid >= requiredBid)
    .sort((a, b) => b.maxBid - a.maxBid || a.id - b.id);
  if (eligible.length === 0) return { winnerId: null, price: null };

  const winner = eligible[0];
  const runnerUp = eligible.find(candidate => candidate.id !== winner.id);
  const floor = winner.id === highestBidderId ? currentBid : requiredBid;
  const competitivePrice = runnerUp ? runnerUp.maxBid + 50 : floor;
  return {
    winnerId: winner.id,
    price: Math.min(winner.maxBid, Math.max(floor, competitivePrice)),
  };
}

function getHighestOpponentRent(player) {
  let highestRent = 0;
  for (const opponent of players) {
    if (opponent.id === player.id) continue;
    for (const pos of opponent.properties) {
      highestRent = Math.max(highestRent, calculateRent(pos, opponent, 1, 1));
    }
  }
  return highestRent;
}

function isOpponentNearMonopoly(player, groupPositions) {
  return players.some(opponent => {
    if (opponent.id === player.id) return false;
    const owned = groupPositions.filter(pos => opponent.properties.includes(pos)).length;
    return owned === groupPositions.length - 1;
  });
}

function getAIAuctionMaxBid(player, pos) {
  const space = SPACES[pos];
  const groupPositions = COLOR_GROUPS[space.group] || [];
  const ownedInGroup = groupPositions.filter(groupPos => player.properties.includes(groupPos)).length;
  const completesGroup = groupPositions.length > 0 && ownedInGroup + 1 >= groupPositions.length;
  const plannedBuildCost = completesGroup ? (HOUSE_COST[space.group] || 0) : 0;
  const reserve = calculateAIAuctionReserve({
    cash: player.money,
    highestOpponentRent: getHighestOpponentRent(player),
    plannedBuildCost,
  });
  const valuation = calculateAIAuctionValuation({
    price: space.price,
    ownedInGroup,
    groupTotal: groupPositions.length,
    opponentNearMonopoly: isOpponentNearMonopoly(player, groupPositions),
    unownedPropertyCount: SPACES.filter((candidate, index) =>
      candidate.type === 'property' && getOwner(index) === null
    ).length,
    canAffordDevelopment: plannedBuildCost === 0 || player.money - reserve >= plannedBuildCost,
  });
  return calculateAIAuctionMaxBid({ cash: player.money, reserve, valuation });
}

function recordAuctionBid(player, amount, propertyPrice) {
  const profile = player.auctionProfile || (player.auctionProfile = {
    bids: 0, passes: 0, bidRatioEMA: 0.5,
  });
  const ratio = Math.max(0, Math.min(1.5, amount / propertyPrice));
  profile.bidRatioEMA = profile.bids === 0
    ? ratio
    : profile.bidRatioEMA * 0.7 + ratio * 0.3;
  profile.bids++;
}

function recordAuctionPass(player) {
  const profile = player.auctionProfile || (player.auctionProfile = {
    bids: 0, passes: 0, bidRatioEMA: 0.5,
  });
  profile.passes++;
}

function getAuctionOpponentAggression(player) {
  const competitors = players.filter(candidate =>
    candidate.id !== player.id && auctionState.activeBidderIds.includes(candidate.id)
  );
  if (competitors.length === 0) return 0.5;
  return competitors.reduce((total, competitor) =>
    total + (competitor.auctionProfile?.bidRatioEMA ?? 0.5), 0
  ) / competitors.length;
}

function startAuction(pos, isDouble, options = {}) {
  const space = SPACES[pos];
  const eligiblePlayers = options.eligiblePlayers || getActivePlayers();
  auctionState = {
    pos: pos,
    highestBid: 100,
    highestBidder: null,
    biddingPlayerIndex: 0,
    activeBidderIds: eligiblePlayers.filter(player => player.money >= 100).map(player => player.id),
    aiMaxBidByPlayer: {},
    isDouble: isDouble || false,
    onComplete: options.onComplete || null,
  };
  for (const player of eligiblePlayers) {
    if (!player.isHuman) auctionState.aiMaxBidByPlayer[player.id] = getAIAuctionMaxBid(player, pos);
  }
  auctionState.activeBidderIds = auctionState.activeBidderIds.filter(playerId => {
    const player = players.find(candidate => candidate.id === playerId);
    return player?.isHuman || auctionState.aiMaxBidByPlayer[playerId] >= 100;
  });
  notify(`拍卖开始！${space.name} 起拍价 $100！`);
  addGameLog('auction', '', `${space.name} 开始拍卖，起拍价 $100`);
  processAuctionBid();
}

function removeActiveAuctionBidder(playerId) {
  if (!auctionState) return;
  auctionState.activeBidderIds = auctionState.activeBidderIds.filter(id => id !== playerId);
}

function tryResolveAIOnlyAuction() {
  if (!auctionState) return false;
  const activePlayers = auctionState.activeBidderIds
    .map(id => players.find(player => player.id === id))
    .filter(Boolean);
  if (activePlayers.length === 0 || activePlayers.some(player => player.isHuman)) return false;

  const candidates = activePlayers.map(player => ({
    id: player.id,
    maxBid: auctionState.aiMaxBidByPlayer[player.id] || 0,
  }));
  const result = resolveAIOnlyAuction({
    currentBid: auctionState.highestBid,
    highestBidderId: auctionState.highestBidder?.id ?? null,
    candidates,
  });

  if (result.winnerId === null) {
    for (const player of activePlayers) {
      recordAuctionPass(player);
      removeActiveAuctionBidder(player.id);
    }
    return false;
  }

  const winner = players.find(player => player.id === result.winnerId);
  for (const player of activePlayers) {
    if (player.id !== winner.id) recordAuctionPass(player);
  }
  auctionState.highestBid = result.price;
  auctionState.highestBidder = winner;
  auctionState.activeBidderIds = [winner.id];
  recordAuctionBid(winner, result.price, SPACES[auctionState.pos].price);
  finalizeAuction(`AI竞价快速结算：${winner.name} 以 $${result.price} 成交！`);
  return true;
}

function processAuctionBid() {
  if (!auctionState) return;

  const resolution = getAuctionResolution(auctionState);
  if (resolution === 'sold') {
    const winner = auctionState.highestBidder;
    finalizeAuction(`无人继续竞价，${winner.name} 以 $${auctionState.highestBid} 自动成交！`);
    return;
  }
  if (resolution === 'unsold') {
    finalizeAuction();
    return;
  }
  if (tryResolveAIOnlyAuction()) return;

  const minBid = getMinimumAuctionBid(auctionState);
  for (let attempts = 0; attempts < players.length; attempts++) {
    const bidder = players[auctionState.biddingPlayerIndex];
    const isActive = auctionState.activeBidderIds.includes(bidder.id);
    const isHighestBidder = auctionState.highestBidder?.id === bidder.id;

    if (!isActive || isHighestBidder) {
      auctionState.biddingPlayerIndex = (auctionState.biddingPlayerIndex + 1) % players.length;
      continue;
    }

    if (bidder.money < minBid) {
      removeActiveAuctionBidder(bidder.id);
      recordAuctionPass(bidder);
      notify(`${bidder.name} 资金不足，退出本轮竞拍。`);
      auctionState.biddingPlayerIndex = (auctionState.biddingPlayerIndex + 1) % players.length;
      continue;
    }

    if (bidder.isHuman) showAuctionModal(bidder);
    else aiAuctionBid(bidder);
    return;
  }

  processAuctionBid();
}

function showAuctionModal(player) {
  const space = SPACES[auctionState.pos];
  const minBid = getMinimumAuctionBid(auctionState);
  const safeBidderName = auctionState.highestBidder ? escapeHTML(auctionState.highestBidder.name) : '';
  const safePlayerName = escapeHTML(player.name);
  const competitorCount = auctionState.activeBidderIds.filter(id => id !== player.id).length;
  const statusText = competitorCount === 0
    ? '当前没有其他竞拍者；提交有效报价后将立即成交。'
    : `仍有 ${competitorCount} 名其他竞拍者。`;
  document.getElementById('auctionTitle').textContent = `拍卖: ${space.name}`;
  document.getElementById('auctionBody').innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:1.2rem;color:var(--gold);margin-bottom:8px;">${space.name}</div>
      <div style="margin-bottom:12px;">当前出价: <b style="color:var(--gold-light);">$${auctionState.highestBid}</b>
        ${auctionState.highestBidder ? ` (${safeBidderName})` : '（暂无出价）'}</div>
      <div style="font-size:0.8rem;color:rgba(232,213,183,0.6);">轮到 ${safePlayerName} 出价（最低 $${minBid}）</div>
      <label class="auction-bid-field" for="auctionBidInput">
        <span class="auction-bid-prefix">$</span>
        <input class="auction-bid-input" id="auctionBidInput" type="number"
          min="${minBid}" max="${player.money}" step="1" inputmode="numeric"
          value="${minBid}" aria-label="自定义出价金额"
          aria-describedby="auctionBidHelp auctionBidError">
      </label>
      <div class="auction-bid-help" id="auctionBidHelp">可输入 $${minBid} 至 $${player.money} 的整数金额</div>
      <div class="auction-bid-error" id="auctionBidError" role="alert" aria-live="polite"></div>
      <div class="auction-status">${statusText}</div>
    </div>
  `;
  document.getElementById('auctionModal').classList.remove('hidden');
  const input = document.getElementById('auctionBidInput');
  const error = document.getElementById('auctionBidError');
  const bidButton = document.getElementById('btnAuctionBid');
  bidButton.textContent = '确认出价';

  const refreshValidation = () => {
    const result = validateAuctionBid(input.value, player.money, minBid);
    input.classList.toggle('invalid', !result.valid);
    input.setAttribute('aria-invalid', String(!result.valid));
    error.textContent = result.message;
    bidButton.disabled = !result.valid;
    return result;
  };

  input.addEventListener('input', refreshValidation);
  input.addEventListener('keydown', event => {
    if (event.key === 'Enter' && !bidButton.disabled) {
      event.preventDefault();
      bidButton.click();
    }
  });
  refreshValidation();
  setTimeout(() => { input.focus(); input.select(); }, 0);

  bidButton.onclick = () => {
    const result = refreshValidation();
    if (!result.valid) return;
    auctionState.highestBid = result.value;
    auctionState.highestBidder = player;
    recordAuctionBid(player, result.value, space.price);
    notify(`${player.name} 出价 $${result.value}！`);
    addGameLog('auction', player.name, `为 ${space.name} 出价 $${result.value}`);
    document.getElementById('auctionModal').classList.add('hidden');
    advanceAuctionBidder();
  };

  document.getElementById('btnAuctionPass').onclick = () => {
    removeActiveAuctionBidder(player.id);
    recordAuctionPass(player);
    document.getElementById('auctionModal').classList.add('hidden');
    notify(`${player.name} 放弃竞拍，本轮不再参与。`);
    advanceAuctionBidder();
  };
}

function aiAuctionBid(player) {
  const space = SPACES[auctionState.pos];
  const minBid = getMinimumAuctionBid(auctionState);
  const maxBid = auctionState.aiMaxBidByPlayer[player.id] || 0;
  if (minBid <= maxBid) {
    const bid = chooseAdaptiveAIBid({
      minBid,
      maxBid,
      propertyPrice: space.price,
      opponentAggression: getAuctionOpponentAggression(player),
    });
    auctionState.highestBid = bid;
    auctionState.highestBidder = player;
    recordAuctionBid(player, bid, space.price);
    notify(`${player.name} 出价 $${bid}！`);
    addGameLog('auction', player.name, `为 ${space.name} 出价 $${bid}`);
  } else {
    removeActiveAuctionBidder(player.id);
    recordAuctionPass(player);
    notify(`${player.name} 放弃竞拍，本轮不再参与。`);
  }
  advanceAuctionBidder();
}

function advanceAuctionBidder() {
  auctionState.biddingPlayerIndex = (auctionState.biddingPlayerIndex + 1) % players.length;
  setTimeout(() => processAuctionBid(), 200);
}

function finalizeAuction(completionMessage = '') {
  const space = SPACES[auctionState.pos];
  const wasDouble = auctionState.isDouble;
  const completion = auctionState.onComplete;
  document.getElementById('auctionModal').classList.add('hidden');
  if (auctionState.highestBidder) {
    const winner = auctionState.highestBidder;
    winner.money -= auctionState.highestBid;
    winner.properties.push(auctionState.pos);
    notify(completionMessage || `${winner.name} 以 $${auctionState.highestBid} 拍得 ${space.name}！`);
    addGameLog('auction', winner.name, `以 $${auctionState.highestBid} 拍得 ${space.name}`);
  } else {
    notify(`${space.name} 流拍，无人购买。`);
    addGameLog('auction', '', `${space.name} 流拍`);
  }
  auctionState = null;
  renderBoard(); updateUI({ refreshBoard: false });
  if (completion) completion();
  else {
    const resumeAfterAuction = () => endTurn(wasDouble);
    if (!checkBankruptcy(players[currentPlayerIndex], null, resumeAfterAuction)) {
      resumeAfterAuction();
    }
  }
}

// ==================== TRADING SYSTEM ====================
// 规则文档: 玩家间自由交易地产/现金/出狱卡, 建筑不能交易(第148-155行)
function canTradeProperty(player, pos) {
  if (!player.properties.includes(pos)) return false;
  if (mortgageStatus[pos]) return true;
  if (houseOwnership[pos]) return false; // 有建筑的地产不能直接交易
  // 同色组内其他地产有建筑也不能交易
  const space = SPACES[pos];
  const group = space.group;
  if (group) {
    const groupProps = COLOR_GROUPS[group] || [];
    for (const p of groupProps) {
      if (houseOwnership[p]) return false;
    }
  }
  return true;
}

function validateTradeProposal(rawProposal) {
  if (!rawProposal || typeof rawProposal !== 'object') {
    return { ok: false, reason: '交易提案无效' };
  }
  const proposal = {
    ...rawProposal,
    offer: normalizeTradeBundle(rawProposal.offer || {}),
    request: normalizeTradeBundle(rawProposal.request || {}),
  };
  const from = players.find(player => player.id === proposal.initiatorId);
  const to = players.find(player => player.id === proposal.recipientId);
  if (!isPlayerActive(from) || !isPlayerActive(to) || from === to) {
    return { ok: false, reason: '交易双方无效' };
  }
  if (proposal.offer.cash > from.money || proposal.request.cash > to.money) {
    return { ok: false, reason: '现金不足' };
  }
  if (proposal.offer.jailCard && !from.hasGetOutOfJailCard) {
    return { ok: false, reason: '发起方没有出狱卡' };
  }
  if (proposal.request.jailCard && !to.hasGetOutOfJailCard) {
    return { ok: false, reason: '接收方没有出狱卡' };
  }
  if (proposal.offer.jailCard && to.hasGetOutOfJailCard && !proposal.request.jailCard) {
    return { ok: false, reason: '接收方已有出狱卡' };
  }
  if (proposal.request.jailCard && from.hasGetOutOfJailCard && !proposal.offer.jailCard) {
    return { ok: false, reason: '发起方已有出狱卡' };
  }

  const allIds = [...proposal.offer.propertyIds, ...proposal.request.propertyIds];
  if (new Set(allIds).size !== allIds.length) {
    return { ok: false, reason: '地产重复' };
  }
  if (!proposal.offer.propertyIds.every(pos => canTradeProperty(from, pos))) {
    return { ok: false, reason: '发起方地产不可交易' };
  }
  if (!proposal.request.propertyIds.every(pos => canTradeProperty(to, pos))) {
    return { ok: false, reason: '接收方地产不可交易' };
  }

  const hasAssets = allIds.length > 0
    || proposal.offer.cash > 0
    || proposal.request.cash > 0
    || proposal.offer.jailCard
    || proposal.request.jailCard;
  return hasAssets ? { ok: true } : { ok: false, reason: '报价不能为空' };
}

function executeTradeProposal(proposal) {
  const validation = validateTradeProposal(proposal);
  if (!validation.ok) return false;

  const from = players.find(player => player.id === proposal.initiatorId);
  const to = players.find(player => player.id === proposal.recipientId);
  const offer = normalizeTradeBundle(proposal.offer);
  const request = normalizeTradeBundle(proposal.request);

  from.money += request.cash - offer.cash;
  to.money += offer.cash - request.cash;
  from.properties = from.properties
    .filter(pos => !offer.propertyIds.includes(pos))
    .concat(request.propertyIds);
  to.properties = to.properties
    .filter(pos => !request.propertyIds.includes(pos))
    .concat(offer.propertyIds);
  from.hasGetOutOfJailCard = Boolean(from.hasGetOutOfJailCard && !offer.jailCard) || request.jailCard;
  to.hasGetOutOfJailCard = Boolean(to.hasGetOutOfJailCard && !request.jailCard) || offer.jailCard;

  addGameLog('property', from.name, `与 ${to.name} 完成地产交易`);
  renderBoard();
  updateUI({ refreshBoard: false });
  return true;
}

function canCounterTrade(proposal) {
  return (proposal?.counterCount || 0) < 2;
}

function getTradePropertyValue(player, pos) {
  const space = SPACES[pos];
  if (!space) return 0;
  const groupPositions = COLOR_GROUPS[space.group] || [];
  const ownedCount = groupPositions.filter(id => player.properties.includes(id)).length;
  const completesGroup = groupPositions.length > 0
    && !player.properties.includes(pos)
    && ownedCount + 1 === groupPositions.length;
  const progressRatio = groupPositions.length ? ownedCount / groupPositions.length : 0;
  const rentValue = (space.baseRent || 0) * 4;
  const completionBonus = completesGroup
    ? space.price * 0.75
    : space.price * progressRatio * 0.2;
  const unmortgageCost = mortgageStatus[pos] ? Math.floor(space.price * 0.55) : 0;
  return Math.max(0, Math.round(space.price + rentValue + completionBonus - unmortgageCost));
}

function calculateTradeCashReserve(player) {
  let opponentRent = 0;
  for (const opponent of players) {
    if (opponent === player || !isPlayerActive(opponent)) continue;
    for (const pos of opponent.properties) {
      opponentRent = Math.max(opponentRent, calculateRent(pos, opponent, 6, 6));
    }
  }

  let plannedBuild = 0;
  for (const [group, positions] of Object.entries(COLOR_GROUPS)) {
    if (positions.every(pos => player.properties.includes(pos))) {
      plannedBuild = Math.max(plannedBuild, HOUSE_COST[group] || 0);
    }
  }
  return Math.max(500, Math.floor(player.money * 0.15), opponentRent, plannedBuild);
}

function evaluateTradeBundle(player, rawBundle) {
  const bundle = normalizeTradeBundle(rawBundle);
  const propertyValue = bundle.propertyIds.reduce(
    (sum, pos) => sum + getTradePropertyValue(player, pos),
    0,
  );
  const jailCardValue = bundle.jailCard ? (player.inJail ? 900 : 450) : 0;
  return propertyValue + bundle.cash + jailCardValue;
}

function getAITradeProfitThreshold() {
  return [1.08, 1.04, 1.01][stalemateState.tier] || 1.08;
}

function evaluateTradeProposalForAI(proposal, aiPlayer) {
  const aiReceives = proposal.recipientId === aiPlayer.id ? proposal.offer : proposal.request;
  const aiGives = proposal.recipientId === aiPlayer.id ? proposal.request : proposal.offer;
  const normalizedReceives = normalizeTradeBundle(aiReceives);
  const normalizedGives = normalizeTradeBundle(aiGives);
  const reserve = calculateTradeCashReserve(aiPlayer);
  const cashAfter = aiPlayer.money + normalizedReceives.cash - normalizedGives.cash;
  if (cashAfter < reserve) return { decision: 'reject', reason: 'cash-reserve' };

  const receivedValue = evaluateTradeBundle(aiPlayer, normalizedReceives);
  const givenValue = evaluateTradeBundle(aiPlayer, normalizedGives);
  const threshold = getAITradeProfitThreshold();
  if (receivedValue >= givenValue * threshold) return { decision: 'accept' };
  if (canCounterTrade(proposal) && receivedValue >= givenValue * 0.78) {
    const cashAdjustment = Math.max(
      50,
      Math.ceil((givenValue * threshold - receivedValue) / 50) * 50,
    );
    return { decision: 'counter', cashAdjustment };
  }
  return { decision: 'reject', reason: 'value' };
}

function createAICounterProposal(proposal, aiPlayer, evaluation) {
  if (evaluation.decision !== 'counter' || !canCounterTrade(proposal)) return null;
  const counter = {
    ...proposal,
    offer: normalizeTradeBundle(proposal.offer),
    request: normalizeTradeBundle(proposal.request),
    counterCount: (proposal.counterCount || 0) + 1,
    status: 'countered',
  };
  const adjustment = Math.max(0, evaluation.cashAdjustment || 0);
  if (proposal.recipientId === aiPlayer.id) {
    const payer = players.find(player => player.id === proposal.initiatorId);
    if (!payer || payer.money < counter.offer.cash + adjustment) return null;
    counter.offer.cash += adjustment;
  } else {
    const payer = players.find(player => player.id === proposal.recipientId);
    if (!payer || payer.money < counter.request.cash + adjustment) return null;
    counter.request.cash += adjustment;
  }
  return counter;
}

function getActivePlayers() {
  return players.filter(isPlayerActive);
}

function shouldEndGame() {
  return getActivePlayers().length <= 1;
}

function getFinalWinner() {
  return getActivePlayers()[0]
    || players.reduce((best, player) => player.money > best.money ? player : best);
}

function getStalemateTier(inactiveRounds) {
  if (inactiveRounds >= 5) return 2;
  if (inactiveRounds >= 3) return 1;
  return 0;
}

function recordStrategicActivity() {
  stalemateState.activityThisRound = true;
  stalemateState.inactiveRounds = 0;
  stalemateState.tier = 0;
}

function recordCompletedTurn(playerId) {
  stalemateState.turnsSeen.add(playerId);
  const activeIds = getActivePlayers().map(player => player.id);
  if (!activeIds.length || !activeIds.every(id => stalemateState.turnsSeen.has(id))) return;
  const previousTier = stalemateState.tier;
  if (!stalemateState.activityThisRound) stalemateState.inactiveRounds++;
  stalemateState.tier = getStalemateTier(stalemateState.inactiveRounds);
  stalemateState.turnsSeen.clear();
  stalemateState.activityThisRound = false;
  if (stalemateState.tier > previousTier) {
    addGameLog('system', '', `市场进入防僵局第 ${stalemateState.tier} 档，AI 将接受更接近公平的报价`);
  }
}

function createTradeProposal(initiatorId, recipientId, offer = createTradeBundle(), request = createTradeBundle()) {
  return {
    id: nextTradeId++,
    initiatorId,
    recipientId,
    offer: normalizeTradeBundle(offer),
    request: normalizeTradeBundle(request),
    counterCount: 0,
    status: 'draft',
  };
}

function retargetTradeProposal(proposal, recipientId, offer) {
  return {
    ...proposal,
    recipientId: Number(recipientId),
    offer: normalizeTradeBundle(offer),
    request: createTradeBundle(),
    status: 'draft',
  };
}

function getTradeTargets(player) {
  return getActivePlayers().filter(target => target.id !== player.id);
}

function renderTradeAssetList(containerId, owner, selectedIds, editable) {
  const container = document.getElementById(containerId);
  if (!owner.properties.length) {
    container.innerHTML = '<div class="trade-empty">没有可交易地产</div>';
    return;
  }
  container.innerHTML = owner.properties.map(pos => {
    const space = SPACES[pos];
    const disabled = !editable || !canTradeProperty(owner, pos);
    const checked = selectedIds.includes(pos) ? 'checked' : '';
    const mortgage = mortgageStatus[pos] ? `抵押 · 解押 $${Math.floor(space.price * 0.55)}` : '未抵押';
    return `<label class="trade-asset-row">
      <input type="checkbox" data-property-id="${pos}" ${checked} ${disabled ? 'disabled' : ''}>
      <span>${escapeHTML(space.name)}<small>${mortgage}</small></span>
      <span>$${space.price}</span>
    </label>`;
  }).join('');
}

function setTradeModalMode(mode) {
  const composing = mode === 'compose';
  document.getElementById('tradeComposeButtons').style.display = composing ? 'flex' : 'none';
  document.getElementById('tradeReviewButtons').style.display = composing ? 'none' : 'flex';
  for (const id of ['tradeOfferCash', 'tradeRequestCash', 'tradeOfferCard', 'tradeRequestCard']) {
    document.getElementById(id).disabled = !composing;
  }
  document.getElementById('tradeTarget').disabled = !composing || (tradeState?.counterCount || 0) > 0;
  document.getElementById('btnTradeCounter').disabled = !canCounterTrade(tradeState);
}

function renderTradeComposer(proposal, mode = 'compose') {
  const from = players.find(player => player.id === proposal.initiatorId);
  const to = players.find(player => player.id === proposal.recipientId);
  const target = document.getElementById('tradeTarget');
  target.innerHTML = getTradeTargets(from)
    .map(player => `<option value="${player.id}" ${player.id === to.id ? 'selected' : ''}>${escapeHTML(player.name)}</option>`)
    .join('');
  document.getElementById('tradeModalTitle').textContent = mode === 'compose' ? '地产交易' : `${from.name} 向 ${to.name} 的报价`;
  document.getElementById('tradeOfferTitle').textContent = `${from.name} 提供`;
  document.getElementById('tradeRequestTitle').textContent = `${to.name} 提供`;
  renderTradeAssetList('tradeOfferList', from, proposal.offer.propertyIds, mode === 'compose');
  renderTradeAssetList('tradeRequestList', to, proposal.request.propertyIds, mode === 'compose');
  document.getElementById('tradeOfferCash').value = proposal.offer.cash;
  document.getElementById('tradeRequestCash').value = proposal.request.cash;
  document.getElementById('tradeOfferCard').checked = proposal.offer.jailCard;
  document.getElementById('tradeOfferCard').disabled = mode !== 'compose' || !from.hasGetOutOfJailCard;
  document.getElementById('tradeRequestCard').checked = proposal.request.jailCard;
  document.getElementById('tradeRequestCard').disabled = mode !== 'compose' || !to.hasGetOutOfJailCard;
  document.getElementById('tradeCounterStatus').textContent = `还价 ${proposal.counterCount || 0}/2`;
  document.getElementById('tradeSummary').textContent = '抵押地产会保留抵押状态；成交前将再次校验全部资产。';
  document.getElementById('tradeError').textContent = '';
  setTradeModalMode(mode);
}

function readCheckedProperties(containerId) {
  return [...document.querySelectorAll(`#${containerId} input[data-property-id]:checked`)]
    .map(input => Number(input.dataset.propertyId));
}

function readTradeComposer() {
  return {
    ...tradeState,
    recipientId: Number(document.getElementById('tradeTarget').value),
    offer: {
      propertyIds: readCheckedProperties('tradeOfferList'),
      cash: Number(document.getElementById('tradeOfferCash').value),
      jailCard: document.getElementById('tradeOfferCard').checked,
    },
    request: {
      propertyIds: readCheckedProperties('tradeRequestList'),
      cash: Number(document.getElementById('tradeRequestCash').value),
      jailCard: document.getElementById('tradeRequestCard').checked,
    },
  };
}

function changeTradeTarget() {
  if (!tradeState || (tradeState.counterCount || 0) > 0) return;
  const offer = {
    propertyIds: readCheckedProperties('tradeOfferList'),
    cash: Number(document.getElementById('tradeOfferCash').value),
    jailCard: document.getElementById('tradeOfferCard').checked,
  };
  const recipientId = Number(document.getElementById('tradeTarget').value);
  tradeState = retargetTradeProposal(tradeState, recipientId, offer);
  renderTradeComposer(tradeState, 'compose');
}

function openTradeComposer() {
  if (debtReliefState) return;
  const current = players[currentPlayerIndex];
  if (!tradeWindow.available || tradeWindow.playerId !== current.id || tradeWindow.locked) return;
  const targets = getTradeTargets(current);
  if (!targets.length) {
    notify('当前没有可交易对象。');
    return;
  }
  tradeState = createTradeProposal(current.id, targets[0].id);
  tradeWindow.locked = true;
  document.getElementById('btnRoll').disabled = true;
  renderTradeComposer(tradeState, 'compose');
  document.getElementById('tradeModal').classList.remove('hidden');
}

function cancelTrade() {
  const resume = tradeState?.resume;
  document.getElementById('tradeModal').classList.add('hidden');
  consumeTradeWindow();
  tradeState = null;
  updateUI({ refreshBoard: false });
  setStatus('交易已取消，可继续掷骰。');
  if (typeof resume === 'function') resume();
}

function submitTradeComposer() {
  const proposal = readTradeComposer();
  const validation = validateTradeProposal(proposal);
  if (!validation.ok) {
    document.getElementById('tradeError').textContent = validation.reason;
    return;
  }
  tradeState = { ...proposal, status: 'submitted' };
  consumeTradeWindow();
  document.getElementById('tradeModal').classList.add('hidden');
  routeTradeProposal(tradeState);
}

function showTradeReview(proposal) {
  tradeState = proposal;
  renderTradeComposer(proposal, 'review');
  document.getElementById('tradeModal').classList.remove('hidden');
}

function showTradeHandoff(targetPlayer, proposal) {
  tradeState = proposal;
  const overlay = document.getElementById('passOverlay');
  overlay.dataset.passPurpose = 'trade';
  overlay.dataset.tradeTargetId = String(targetPlayer.id);
  document.getElementById('passPlayerName').textContent = targetPlayer.name;
  document.getElementById('passPlayerColor').style.backgroundColor = targetPlayer.color;
  overlay.style.display = 'flex';
  document.getElementById('tradeModal').classList.add('hidden');
  setStatus(`请将设备交给 ${targetPlayer.name} 查看报价。`);
}

function routeTradeProposal(proposal) {
  const target = players.find(player => player.id === proposal.recipientId);
  if (target.isHuman) {
    if (gameMode === 'human') showTradeHandoff(target, proposal);
    else showTradeReview(proposal);
    return;
  }
  const evaluation = evaluateTradeProposalForAI(proposal, target);
  if (evaluation.decision === 'accept') {
    executeTradeProposal(proposal);
    notify(`${target.name} 接受了交易。`);
    addGameLog('property', target.name, '接受交易报价');
    finishTradeFlow();
  } else if (evaluation.decision === 'counter') {
    const counter = createAICounterProposal(proposal, target, evaluation);
    if (counter) {
      notify(`${target.name} 提出了还价。`);
      const human = players.find(player => player.id === counter.initiatorId);
      if (gameMode === 'human') showTradeHandoff(human, counter);
      else showTradeReview(counter);
    } else {
      notify(`${target.name} 拒绝了交易。`);
      finishTradeFlow();
    }
  } else {
    notify(`${target.name} 拒绝了交易。`);
    addGameLog('system', target.name, '拒绝交易报价');
    finishTradeFlow();
  }
}

function finishTradeFlow() {
  const resume = tradeState?.resume;
  document.getElementById('tradeModal').classList.add('hidden');
  tradeState = null;
  tradeWindow.locked = false;
  updateUI({ refreshBoard: false });
  const current = players[currentPlayerIndex];
  if (current?.isHuman) setStatus('交易结束，继续当前回合。');
  if (typeof resume === 'function') resume();
}

function acceptTrade() {
  const success = executeTradeProposal(tradeState);
  notify(success ? '交易完成。' : '资产状态已变化，交易取消。');
  if (success) recordStrategicActivity();
  finishTradeFlow();
}

function rejectTrade() {
  addGameLog('system', '', '交易被拒绝');
  finishTradeFlow();
}

function prepareCounterTrade() {
  if (!canCounterTrade(tradeState)) {
    notify('已达到两轮还价上限。');
    return;
  }
  const previous = tradeState;
  tradeState = {
    ...previous,
    initiatorId: previous.recipientId,
    recipientId: previous.initiatorId,
    offer: normalizeTradeBundle(previous.request),
    request: normalizeTradeBundle(previous.offer),
    counterCount: (previous.counterCount || 0) + 1,
    status: 'draft',
  };
  renderTradeComposer(tradeState, 'compose');
}

function scoreAITradeTarget(aiPlayer, owner, pos) {
  const group = COLOR_GROUPS[SPACES[pos].group] || [];
  const aiOwned = group.filter(id => aiPlayer.properties.includes(id)).length;
  const ownerOwned = group.filter(id => owner.properties.includes(id)).length;
  const completesAIGroup = group.length > 0 && aiOwned + 1 === group.length;
  const blocksOwnerGroup = group.length > 0 && ownerOwned === group.length - 1;
  return (completesAIGroup ? 1000 : 0) + (blocksOwnerGroup ? 350 : 0) + aiOwned * 80;
}

function buildAIProposalForTarget(aiPlayer, owner) {
  const candidate = owner.properties
    .filter(pos => canTradeProperty(owner, pos))
    .map(pos => ({ pos, score: scoreAITradeTarget(aiPlayer, owner, pos) }))
    .filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score)[0];
  if (!candidate) return null;
  const cash = Math.ceil(getTradePropertyValue(aiPlayer, candidate.pos) / 50) * 50;
  if (aiPlayer.money - cash < calculateTradeCashReserve(aiPlayer)) return null;
  return createTradeProposal(
    aiPlayer.id,
    owner.id,
    { propertyIds: [], cash, jailCard: false },
    { propertyIds: [candidate.pos], cash: 0, jailCard: false },
  );
}

function resolveAIToAITrade(proposal) {
  const target = players.find(player => player.id === proposal.recipientId);
  const evaluation = evaluateTradeProposalForAI(proposal, target);
  if (evaluation.decision === 'accept') {
    if (executeTradeProposal(proposal)) recordStrategicActivity();
    return;
  }
  if (evaluation.decision !== 'counter') return;
  const counter = createAICounterProposal(proposal, target, evaluation);
  if (!counter) return;
  const initiator = players.find(player => player.id === counter.recipientId);
  const response = evaluateTradeProposalForAI(counter, initiator);
  if (response.decision === 'accept' && executeTradeProposal(counter)) recordStrategicActivity();
}

function attemptAITradeAtTurnStart(aiPlayer, done) {
  const candidates = getActivePlayers()
    .filter(player => player.id !== aiPlayer.id)
    .filter(player => allowAIInitiatedHumanTrades || !player.isHuman);
  const proposal = candidates
    .map(player => buildAIProposalForTarget(aiPlayer, player))
    .filter(Boolean)
    .sort((a, b) => evaluateTradeBundle(aiPlayer, b.request) - evaluateTradeBundle(aiPlayer, a.request))[0];
  if (!proposal) {
    done();
    return;
  }
  consumeTradeWindow();
  const target = players.find(player => player.id === proposal.recipientId);
  if (target.isHuman) {
    proposal.resume = done;
    tradeState = proposal;
    if (gameMode === 'human') showTradeHandoff(target, proposal);
    else showTradeReview(proposal);
    return;
  }
  resolveAIToAITrade(proposal);
  done();
}

// ==================== BANKRUPTCY LADDER ====================
// 规则文档: 破产阶梯 卖建筑→抵押地产→出售资产→破产(第226-232行)
function transferBankruptAssetsToCreditor(debtor, creditor) {
  creditor.properties.push(...debtor.properties);
  debtor.properties = [];
  if (debtor.hasGetOutOfJailCard) {
    creditor.hasGetOutOfJailCard = true;
    debtor.hasGetOutOfJailCard = false;
  }
}

function detachBankruptProperties(debtor) {
  const properties = [...debtor.properties];
  debtor.properties = [];
  return properties;
}

function eliminatePlayer(player) {
  player.bankrupt = true;
  player.inJail = false;
  player.jailTurns = 0;
  player.money = 0;
  if (tradeState && [tradeState.initiatorId, tradeState.recipientId].includes(player.id)) {
    document.getElementById('tradeModal')?.classList.add('hidden');
    tradeState = null;
    tradeWindow.locked = false;
    notify('交易因玩家破产而取消。');
  }
}

function liquidatePropertiesByAuction(propertyIds, done) {
  const queue = [...propertyIds];
  const next = () => {
    if (queue.length === 0) {
      done();
      return;
    }
    const pos = queue.shift();
    addGameLog('auction', '', `${SPACES[pos].name} 进入破产清算拍卖`);
    startAuction(pos, false, {
      eligiblePlayers: getActivePlayers(),
      onComplete: next,
    });
  };
  next();
}

function finalizePlayerBankruptcy(player, creditor = null) {
  notify(`${player.name} 破产了！资产将被清算...`);
  addGameLog('system', player.name, '宣布破产，资产进入清算');
  const activeCreditor = creditor && creditor !== player && isPlayerActive(creditor)
    ? creditor
    : null;
  const liquidationProperties = activeCreditor ? [] : detachBankruptProperties(player);

  if (activeCreditor) {
    transferBankruptAssetsToCreditor(player, activeCreditor);
    notify(`${activeCreditor.name} 获得了 ${player.name} 的可转移资产。`);
    addGameLog('property', activeCreditor.name, `接收 ${player.name} 的全部地产`);
  } else {
    player.hasGetOutOfJailCard = false;
  }

  eliminatePlayer(player);
  renderBoard();
  updateUI({ refreshBoard: false });

  if (shouldEndGame()) {
    setTimeout(() => endGame(), 800);
    return true;
  }

  const resumeAfterLiquidation = () => {
    if (!gameOver) endTurn(false);
  };
  if (liquidationProperties.length > 0) {
    liquidatePropertiesByAuction(liquidationProperties, resumeAfterLiquidation);
  } else {
    resumeAfterLiquidation();
  }
  return true;
}

function startHumanDebtRelief(player, creditor, resume) {
  if (debtReliefState?.playerId === player.id) return;
  debtReliefState = {
    playerId: player.id,
    creditorId: creditor?.id ?? null,
    initialDebt: Math.max(1, Math.abs(player.money)),
    resume: typeof resume === 'function' ? resume : null,
    completed: false,
  };
  consumeTradeWindow();
  addGameLog('system', player.name, `进入债务处置，需筹集 $${Math.abs(player.money)}`);
  showDebtReliefModal();
}

function finishDebtRelief(shouldResume) {
  const state = debtReliefState;
  if (!state || state.completed) return;
  state.completed = true;
  const resume = state.resume;
  debtReliefState = null;
  document.getElementById('debtReliefModal')?.classList.add('hidden');
  if (shouldResume && typeof resume === 'function') resume();
}

function autoResolveAIDebt(player) {
  // 卖房需要多轮扫描：出售后面的房产会降低 maxHouses，让前面的房产重新可出售
  let changed = true;
  while (changed && player.money < 0) {
    changed = false;
    for (const pos of [...player.properties]) {
      while (player.money < 0 && canSellHouse(player, pos)) {
        sellHouse(player, pos);
        changed = true;
      }
    }
  }
  for (const pos of [...player.properties]) {
    if (player.money >= 0) break;
    if (canMortgage(player, pos)) mortgageProperty(player, pos);
  }
  return player.money >= 0;
}

function checkBankruptcy(player, creditor = null, resume = null) {
  if (player.money >= 0 || player.bankrupt) return false;

  if (player.isHuman) {
    const actions = getDebtReliefActions(player);
    if (hasDebtReliefActions(actions)) {
      startHumanDebtRelief(player, creditor, resume);
      return true;
    }
    return finalizePlayerBankruptcy(player, creditor);
  }

  if (autoResolveAIDebt(player)) {
    notify(`${player.name} 通过自动处置资产偿清了债务。`);
    return false;
  }
  return finalizePlayerBankruptcy(player, creditor);
}

function endGame() {
  gameOver = true;
  document.getElementById('btnRoll').disabled = true;
  document.getElementById('passOverlay').style.display = 'none';
  document.getElementById('turnIndicator').style.display = 'none';

  const winner = getFinalWinner();
  const humanWon = winner.isHuman;
  addGameLog('system', winner.name, `以 $${winner.money} 赢得比赛`);

  if (gameMode === 'human') {
    document.getElementById('gameOverTitle').textContent = '游 戏 结 束';
    document.getElementById('gameOverWinner').textContent = `${winner.name} 以 $${winner.money} 赢得比赛！`;
  } else {
    document.getElementById('gameOverTitle').textContent = humanWon ? '恭 喜 胜 利！' : '游 戏 结 束';
    document.getElementById('gameOverWinner').textContent = humanWon
      ? `你以 $${winner.money} 赢得比赛！`
      : `${winner.name} 以 $${winner.money} 获胜...再来一局吧！`;
  }
  document.getElementById('gameOverOverlay').style.display = 'flex';
}

// ==================== PASS DEVICE (Human vs Human) ====================
function showPassDevice() {
  const player = players[currentPlayerIndex];
  document.getElementById('passOverlay').dataset.passPurpose = 'turn';
  document.getElementById('passPlayerName').textContent = player.name;
  const colorEl = document.getElementById('passPlayerColor');
  colorEl.style.backgroundColor = player.color;
  document.getElementById('passOverlay').style.display = 'flex';
  document.getElementById('btnRoll').disabled = true;
  setStatus(`等待 ${player.name} 接手...`);
}

function confirmPassDevice() {
  const overlay = document.getElementById('passOverlay');
  if (overlay.dataset.passPurpose === 'trade') {
    overlay.style.display = 'none';
    overlay.dataset.passPurpose = '';
    showTradeReview(tradeState);
    return;
  }
  const player = players[currentPlayerIndex];
  overlay.style.display = 'none';
  document.getElementById('btnRoll').disabled = false;
  setStatus(`${player.name} 的回合，点击掷骰子！`);
  showTurnIndicator(player);
}

function showTurnIndicator(player) {
  const indicator = document.getElementById('turnIndicator');
  const text = document.getElementById('turnIndicatorText');
  text.innerHTML = `<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${player.color};margin-right:8px;vertical-align:middle;"></span>${escapeHTML(player.name)} 的回合`;
  indicator.style.display = 'block';
  // Auto-hide after 3 seconds
  setTimeout(() => { indicator.style.display = 'none'; }, 3000);
}

// ==================== UI ====================
function updateUI(options = {}) {
  const { refreshBoard = true } = options;
  const container = document.getElementById('playerInfo');
  container.innerHTML = players.map(p => {
    const safeName = escapeHTML(p.name);
    const safeToken = escapeHTML(gameMode === 'human' ? p.name.charAt(0) : (p.isHuman ? '你' : 'C'));
    return `
    <div class="player-item" style="${p.bankrupt ? 'opacity:0.45;filter:grayscale(0.7);' : ''}${currentPlayerIndex === players.indexOf(p) && !p.bankrupt ? 'border-color:var(--gold);background:rgba(201,168,76,0.08);box-shadow:0 0 20px rgba(201,168,76,0.15);' : ''}">
      <div class="player-token" style="background:linear-gradient(135deg,${p.color},${p.color}dd);">${safeToken}</div>
      <div class="player-details">
        <div class="player-name">${safeName} ${p.bankrupt ? '· 已破产' : (p.inJail ? '🔒' : '')}</div>
        <div class="player-money">$${p.money}</div>
        <div class="player-props">${p.properties.length} 处地产</div>
      </div>
    </div>
  `;
  }).join('');

  updatePropertyPanel();
  updateHousePanel();
  if (refreshBoard) renderBoard();

  const btn = document.getElementById('btnRoll');
  if (btn && !gameOver) {
    btn.disabled = !canCurrentPlayerRoll();
  }
  const tradeBtn = document.getElementById('btnTrade');
  if (tradeBtn) {
    const current = players[currentPlayerIndex];
    tradeBtn.disabled = !current?.isHuman
      || !isPlayerActive(current)
      || !tradeWindow.available
      || tradeWindow.playerId !== current.id
      || tradeWindow.locked
      || Boolean(tradeState)
      || Boolean(debtReliefState);
  }
  const bailBtn = document.getElementById('btnBail');
  if (bailBtn) {
    const cp = players[currentPlayerIndex];
    bailBtn.style.display = (cp.inJail && cp.isHuman && cp.money >= 500) ? '' : 'none';
  }
}

function updatePropertyPanel() {
  const panel = document.getElementById('propertyPanel');
  const list = document.getElementById('propertyList');
  const player = players[currentPlayerIndex]; // Show current player's properties
  if (player.properties.length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  list.innerHTML = player.properties.map(pos => {
    const s = SPACES[pos];
    const houses = houseOwnership[pos] || 0;
    const houseLabel = houses === 0 ? '' : ` [${HOUSE_LEVEL_NAMES[houses]}]`;
    const mortgaged = mortgageStatus[pos];
    return `<div style="margin:2px 0;display:flex;align-items:center;gap:6px;">
      <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${s.group && GROUP_COLORS[s.group] ? GROUP_COLORS[s.group] : '#888'};flex-shrink:0;"></span>
      ${mortgaged ? '🔒' : ''}${s.name}${houseLabel}
      <span style="color:var(--gold-light);margin-left:auto;">$${s.price}</span>
      ${!mortgaged && houses === 0 && player.isHuman ? `<button class="btn-house" style="font-size:0.5rem;padding:1px 4px;" onclick="mortgageProperty(players[${currentPlayerIndex}],${pos})">抵押</button>` : ''}
      ${mortgaged && player.isHuman ? `<button class="btn-house" style="font-size:0.5rem;padding:1px 4px;" onclick="unmortgageProperty(players[${currentPlayerIndex}],${pos})">解押</button>` : ''}
    </div>`;
  }).join('');
}

function updateHousePanel() {
  const panel = document.getElementById('housePanel');
  const list = document.getElementById('houseList');
  const player = players[currentPlayerIndex]; // Show current player's properties
  if (player.properties.length === 0) { panel.style.display = 'none'; return; }

  let html = '';
  const groups = Object.entries(COLOR_GROUPS);
  for (const [group, positions] of groups) {
    const owned = positions.filter(p => player.properties.includes(p));
    if (owned.length !== positions.length) continue;

    const cost = HOUSE_COST[group];
    html += `<div style="font-size:0.6rem;color:var(--gold);margin:6px 0 2px;letter-spacing:1px;">${group.toUpperCase()} (建房费: $${cost})</div>`;
    for (const pos of owned) {
      const s = SPACES[pos];
      const houses = houseOwnership[pos] || 0;
      const canBuild = canBuildHouse(player, pos);
      const label = HOUSE_LEVEL_NAMES[houses] || `${houses}级`;
      const canSell = canSellHouse(player, pos) && player.isHuman;
      const sellRefund = houses > 0 ? Math.floor(HOUSE_COST[group] * 0.5) : 0;
      html += `<div class="house-upgrade-item">
        <div class="prop-info">
          <div class="prop-name-u">${s.name}</div>
          <div class="prop-houses">${label} | 租金: $${houses > 0 ? s.baseRent * RENT_MULTIPLIER[houses] : s.baseRent}</div>
        </div>
        ${canSell ? `<button class="btn-house" style="border-color:#e74c3c;color:#e74c3c;" onclick="sellHouse(players[${currentPlayerIndex}],${pos})">出售 +$${sellRefund}</button>` : ''}
        <button class="btn-house" ${canBuild ? `onclick="buildHouse(players[${currentPlayerIndex}],${pos})"` : 'disabled'}>
          ${houses >= 4 ? '满级' : `升级 $${cost}`}
        </button>
      </div>`;
    }
  }

  if (html) {
    panel.style.display = 'block';
    list.innerHTML = html;
  } else {
    panel.style.display = 'none';
  }
}

function setStatus(msg) { const el = document.getElementById('gameStatus'); if (el) el.textContent = msg; }

// ==================== PENALTY ANIMATION ====================
function showPenaltyAnimation(amount) {
  const container = document.getElementById('penaltyContainer');
  const el = document.createElement('div');
  el.className = 'penalty-overlay';
  el.innerHTML = `<div class="penalty-burst">
    <div class="penalty-amount">-$${amount}</div>
    <div class="penalty-label">支付罚金</div>
  </div>`;
  container.appendChild(el);
  setTimeout(() => el.classList.add('fade-out'), 920);
  setTimeout(() => el.remove(), 1200);
}

// ==================== DICE RESULT OVERLAY ====================
function showDiceResult(d1, d2, isDouble, callback) {
  const overlay = document.getElementById('diceResultOverlay');
  const die1HTML = renderDiceHTML(d1);
  const die2HTML = renderDiceHTML(d2);
  const total = d1 + d2;

  overlay.innerHTML = `
    <div class="dice-result-content">
      <div class="dice-result-dice">
        <div class="dice-result-die">${die1HTML}</div>
        <div class="dice-result-die">${die2HTML}</div>
      </div>
      <div class="dice-result-info">
        <div class="dice-result-total">${total}</div>
        <div class="dice-result-label">${d1} + ${d2}</div>
        ${isDouble ? '<div class="dice-result-double">★ DOUBLES ★</div>' : ''}
      </div>
    </div>
  `;
  overlay.style.display = 'flex';
  overlay.classList.remove('fade-out');

  setTimeout(() => {
    overlay.classList.add('fade-out');
    setTimeout(() => {
      overlay.style.display = 'none';
      overlay.classList.remove('fade-out');
      if (callback) callback();
    }, 300);
  }, 1500);
}

function renderDiceHTML(value) {
  const dotMap = {
    1: [[1,1]], 2: [[0,2],[2,0]], 3: [[0,2],[1,1],[2,0]],
    4: [[0,0],[0,2],[2,0],[2,2]], 5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
    6: [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
  };
  const dots = dotMap[value];
  const grid = Array(9).fill('<span></span>');
  dots.forEach(([r, c]) => { grid[r * 3 + c] = '<span class="rdot"></span>'; });
  return grid.join('');
}

// ==================== ANIMATED MOVEMENT ====================
function getCellElement(pos) {
  const grid = document.getElementById('boardGrid');
  const cells = grid.querySelectorAll('.cell');
  for (const cell of cells) {
    if (cell.dataset.position === String(pos)) return cell;
  }
  return null;
}

function animateMove(player, path, finalPos, passedGo, onComplete) {
  const startPos = player.position;
  const boardGrid = document.getElementById('boardGrid');
  const gridRect = boardGrid.getBoundingClientRect();

  const token = document.createElement('div');
  token.className = 'moving-token';
  token.style.color = player.color;
  token.style.background = player.color;
  boardGrid.appendChild(token);

  const startCell = getCellElement(startPos);
  if (startCell) {
    const sc = startCell.getBoundingClientRect();
    token.style.left = (sc.left - gridRect.left + sc.width / 2 - 8) + 'px';
    token.style.top = (sc.top - gridRect.top + sc.height / 2 - 8) + 'px';
  }

  let stepIndex = 0;
  const stepDelay = 180;

  function doStep() {
    if (stepIndex >= path.length) {
      token.style.transition = 'all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
      const finalCell = getCellElement(finalPos);
      if (finalCell) {
        const fc = finalCell.getBoundingClientRect();
        token.style.left = (fc.left - gridRect.left + fc.width / 2 - 8) + 'px';
        token.style.top = (fc.top - gridRect.top + fc.height / 2 - 8) + 'px';
      }
      setTimeout(() => {
        token.remove();
        player.position = finalPos;
        if (passedGo) {
          notify(`${player.name} 经过起点，获得 $1000！`);
          addGameLog('gain', player.name, '经过起点，获得 $1000');
        }
        if (onComplete) onComplete();
      }, 350);
      return;
    }

    const currentPos = path[stepIndex];
    const cell = getCellElement(currentPos);
    if (cell) {
      const cr = cell.getBoundingClientRect();
      token.style.transition = `all ${stepDelay * 0.8}ms ease-out`;
      token.style.left = (cr.left - gridRect.left + cr.width / 2 - 8) + 'px';
      token.style.top = (cr.top - gridRect.top + cr.height / 2 - 8) + 'px';

      const trace = document.createElement('div');
      trace.className = 'path-trace';
      trace.style.background = player.color;
      trace.style.left = (cr.left - gridRect.left + cr.width / 2 - 5) + 'px';
      trace.style.top = (cr.top - gridRect.top + cr.height / 2 - 5) + 'px';
      boardGrid.appendChild(trace);
      setTimeout(() => trace.remove(), 600);
    }

    stepIndex++;
    setTimeout(doStep, stepDelay);
  }

  doStep();
}

// ==================== NOTIFICATIONS ====================
function notify(msg) {
  const container = document.getElementById('notificationContainer');
  const el = document.createElement('div');
  el.className = 'notification';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.classList.add('fade-out'); setTimeout(() => el.remove(), 300); }, 2500);
}

  const d1 = document.getElementById('dice1'), d2 = document.getElementById('dice2');
  if (d1) renderDice(d1, 1);
  if (d2) renderDice(d2, 1);
}, 100);
